<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>抓大鹅 2D - 极简版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        #game-canvas {
            display: block;
            width: 100%;
        }
        .header {
            padding: 15px;
            background: #667eea;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .stats {
            display: flex;
            gap: 15px;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }
        .slot-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 15px;
            background: #333;
        }
        .slot {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px dashed rgba(255,255,255,0.4);
        }
        .slot.filled {
            border-style: solid;
            background: rgba(255,255,255,0.4);
        }
        .controls {
            padding: 15px;
            text-align: center;
        }
        .btn {
            padding: 12px 40px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.5;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        #message.show {
            display: block;
        }
        #message h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        #message p {
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>🦢 抓大鹅 2D</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">关卡</div>
                    <div class="stat-value" id="level">1/5</div>
                </div>
                <div class="stat">
                    <div class="stat-label">时间</div>
                    <div class="stat-value" id="timer">60s</div>
                </div>
                <div class="stat">
                    <div class="stat-label">消除</div>
                    <div class="stat-value" id="matched">0</div>
                </div>
            </div>
        </div>
        
        <canvas id="game-canvas" width="400" height="500"></canvas>
        
        <div class="slot-bar" id="slotBar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        
        <div class="controls">
            <button class="btn" id="startBtn">▶️ 开始游戏</button>
        </div>
        
        <div id="message">
            <h2 id="msgTitle">🎉 胜利！</h2>
            <p id="msgText">消除所有物品！</p>
            <button class="btn" id="replayBtn">🔄 再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const replayBtn = document.getElementById('replayBtn');
        const message = document.getElementById('message');
        const msgTitle = document.getElementById('msgTitle');
        const msgText = document.getElementById('msgText');
        const timerEl = document.getElementById('timer');
        const matchedEl = document.getElementById('matched');
        const levelEl = document.getElementById('level');
        const slotBar = document.getElementById('slotBar');
        
        // 游戏状态
        let items = [];
        let slots = Array(7).fill(null);
        let matchedCount = 0;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval = null;
        let currentLevel = 1;
        let totalLevels = 5;
        
        // 难度配置
        const difficultyConfig = {
            1: { layers: 2, types: 4, time: 60, speed: 1.0 },    // 简单：2 层，4 种
            2: { layers: 3, types: 5, time: 70, speed: 1.0 },    // 普通：3 层，5 种
            3: { layers: 4, types: 6, time: 80, speed: 0.9 },    // 困难：4 层，6 种
            4: { layers: 5, types: 7, time: 90, speed: 0.8 },    // 专家：5 层，7 种
            5: { layers: 6, types: 8, time: 100, speed: 0.7 }    // 大师：6 层，8 种
        };
        
        // 物品类型（用颜色和 emoji）
        const itemTypes = [
            { color: '#FF6B6B', emoji: '🦢' },
            { color: '#4ECDC4', emoji: '🐥' },
            { color: '#45B7D1', emoji: '🐰' },
            { color: '#F7B731', emoji: '🐱' },
            { color: '#A3CB38', emoji: '🐶' },
            { color: '#D980FA', emoji: '🐸' },
            { color: '#FF8E53', emoji: '🦊' },
            { color: '#2ED573', emoji: '🐼' },
            { color: '#1E90FF', emoji: '🐨' },
            { color: '#FF4757', emoji: '🐯' }
        ];
        
        // 初始化
        function init() {
            startBtn.addEventListener('click', startGame);
            replayBtn.addEventListener('click', () => {
                message.classList.remove('show');
                startGame();
            });
            canvas.addEventListener('click', handleCanvasClick);
            drawEmptyBoard();
        }
        
        // 绘制空游戏板
        function drawEmptyBoard() {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // 开始游戏
        function startGame() {
            gameActive = true;
            matchedCount = 0;
            items = [];
            slots = Array(7).fill(null);
            
            // 获取当前关卡配置
            const config = difficultyConfig[currentLevel] || difficultyConfig[5];
            timeLeft = config.time;
            
            // 清空槽位 UI
            const slotEls = slotBar.querySelectorAll('.slot');
            slotEls.forEach(slot => {
                slot.textContent = '';
                slot.classList.remove('filled');
            });
            
            // 更新显示
            levelEl.textContent = `${currentLevel}/${totalLevels}`;
            timerEl.textContent = timeLeft + 's';
            matchedEl.textContent = '0';
            timerEl.style.color = 'white';
            
            // 生成物品（根据关卡难度）
            generateItems(config.layers, config.types);
            
            // 启动计时器
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft + 's';
                
                if (timeLeft <= 10) {
                    timerEl.style.color = '#ff6b6b';
                }
                
                if (timeLeft <= 0) {
                    gameOver(false);
                }
            }, 1000);
            
            draw();
        }
        
        // 下一关
        function nextLevel() {
            currentLevel++;
            if (currentLevel > totalLevels) {
                // 通关全部关卡
                gameWin();
            } else {
                startGame();
            }
        }
        
        // 生成物品（带层级）
        function generateItems(layers, typesCount) {
            const selectedTypes = itemTypes.slice(0, typesCount);
            const itemsPerLayer = 8 + currentLevel * 2; // 每层物品数随关卡增加
            
            for (let layer = 0; layer < layers; layer++) {
                selectedTypes.forEach(type => {
                    const count = 3 + Math.floor(Math.random() * 3); // 3-5 个
                    for (let i = 0; i < count; i++) {
                        // 层级偏移，制造堆叠效果
                        const offsetX = (layer - layers/2) * 15;
                        const offsetY = (layer - layers/2) * 10;
                        
                        items.push({
                            x: Math.random() * 300 + 50 + offsetX,
                            y: Math.random() * 350 + 80 + offsetY,
                            type: type,
                            width: 50,
                            height: 50,
                            layer: layer,
                            selected: false,
                            matched: false,
                            alpha: 1 - (layer * 0.15) // 上层更透明
                        });
                    }
                });
            }
            
            draw();
        }
        
        // 绘制游戏（带层级效果）
        function draw() {
            drawEmptyBoard();
            
            // 按层级排序，上层先绘制
            const sortedItems = [...items].sort((a, b) => b.layer - a.layer);
            
            // 绘制物品
            sortedItems.forEach(item => {
                if (item.matched) return;
                
                // 阴影（下层物品）
                if (item.layer > 0) {
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(item.x + 3, item.y + 3, item.width, item.height);
                }
                
                // 背景
                ctx.globalAlpha = item.alpha || 1;
                ctx.fillStyle = item.type.color;
                ctx.fillRect(item.x, item.y, item.width, item.height);
                
                // 边框
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.strokeRect(item.x, item.y, item.width, item.height);
                
                // 层级标识（小圆点）
                if (item.layer > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath();
                    ctx.arc(item.x + item.width - 8, item.y + 8, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Emoji
                ctx.globalAlpha = 1;
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                ctx.fillText(item.type.emoji, item.x + item.width/2, item.y + item.height/2);
            });
            
            // 绘制层级提示
            const maxLayer = Math.max(...items.map(i => i.layer));
            if (maxLayer > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(10, 10, 80, 25);
                ctx.fillStyle = 'white';
                ctx.font = '14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`层数：${maxLayer + 1}`, 15, 28);
            }
        }
        
        // 处理点击
        function handleCanvasClick(e) {
            if (!gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // 检查点击了哪个物品
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (item.matched || item.selected) continue;
                
                if (x >= item.x && x <= item.x + item.width &&
                    y >= item.y && y <= item.y + item.height) {
                    selectItem(item);
                    break;
                }
            }
        }
        
        // 选择物品
        function selectItem(item) {
            const emptyIndex = slots.findIndex(s => s === null);
            if (emptyIndex === -1) {
                gameOver(false);
                return;
            }
            
            item.selected = true;
            slots[emptyIndex] = item;
            
            // 更新槽位 UI
            updateSlots();
            
            // 检查匹配
            checkMatch();
        }
        
        // 更新槽位显示
        function updateSlots() {
            const slotEls = slotBar.querySelectorAll('.slot');
            slotEls.forEach((slot, i) => {
                if (slots[i]) {
                    slot.textContent = slots[i].type.emoji;
                    slot.classList.add('filled');
                } else {
                    slot.textContent = '';
                    slot.classList.remove('filled');
                }
            });
        }
        
        // 检查匹配
        function checkMatch() {
            for (let i = 2; i < 7; i++) {
                if (slots[i] && slots[i-1] && slots[i-2] &&
                    slots[i].type.color === slots[i-1].type.color &&
                    slots[i-1].type.color === slots[i-2].type.color) {
                    
                    // 匹配成功
                    setTimeout(() => {
                        slots[i].matched = true;
                        slots[i-1].matched = true;
                        slots[i-2].matched = true;
                        slots[i] = null;
                        slots[i-1] = null;
                        slots[i-2] = null;
                        
                        matchedCount += 3;
                        matchedEl.textContent = matchedCount;
                        
                        updateSlots();
                        draw();
                        checkWin();
                    }, 300);
                    
                    return;
                }
            }
        }
        
        // 检查胜利
        function checkWin() {
            const remaining = items.filter(i => !i.matched && !i.selected).length;
            
            if (remaining === 0) {
                // 当前关卡胜利
                if (currentLevel < totalLevels) {
                    showLevelComplete();
                } else {
                    gameWin();
                }
            } else if (slots.filter(s => s !== null).length === 7) {
                // 槽位满了，检查是否有可消除的
                const hasMatch = checkPossibleMatch();
                if (!hasMatch) {
                    gameOver(false);
                }
            }
        }
        
        // 显示关卡完成
        function showLevelComplete() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            msgTitle.textContent = `🎉 第${currentLevel}关完成！`;
            msgText.textContent = `准备挑战第${currentLevel + 1}关！`;
            message.classList.add('show');
            
            // 修改按钮为"下一关"
            replayBtn.textContent = '➡️ 下一关';
            replayBtn.onclick = () => {
                message.classList.remove('show');
                nextLevel();
                replayBtn.textContent = '🔄 再玩一次';
                replayBtn.onclick = () => {
                    message.classList.remove('show');
                    startGame();
                };
            };
        }
        
        // 通关全部关卡
        function gameWin() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            msgTitle.textContent = '🏆 恭喜通关！';
            msgText.textContent = `你完成了全部${totalLevels}个关卡！\n消除总数：${matchedCount}`;
            message.classList.add('show');
            
            // 修改按钮为"重新开始"
            replayBtn.textContent = '🔄 从头开始';
            replayBtn.onclick = () => {
                currentLevel = 1;
                message.classList.remove('show');
                startGame();
                replayBtn.textContent = '🔄 再玩一次';
                replayBtn.onclick = () => {
                    message.classList.remove('show');
                    startGame();
                };
            };
        }
        
        // 检查是否有潜在匹配
        function checkPossibleMatch() {
            const colorCount = {};
            slots.forEach(slot => {
                if (slot) {
                    colorCount[slot.type.color] = (colorCount[slot.type.color] || 0) + 1;
                }
            });
            return Object.values(colorCount).some(count => count >= 3);
        }
        
        // 游戏结束
        function gameOver(isWin) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            if (isWin) {
                if (currentLevel < totalLevels) {
                    showLevelComplete();
                } else {
                    gameWin();
                }
            } else {
                msgTitle.textContent = '😢 游戏结束';
                msgText.textContent = `第${currentLevel}关失败\n消除数：${matchedCount}\n时间到！`;
                message.classList.add('show');
                
                // 失败后重玩当前关卡
                replayBtn.textContent = '🔄 重试本关';
                replayBtn.onclick = () => {
                    message.classList.remove('show');
                    startGame();
                    replayBtn.textContent = '🔄 再玩一次';
                    replayBtn.onclick = () => {
                        message.classList.remove('show');
                        startGame();
                    };
                };
            }
        }
        
        // 启动
        init();
    </script>
</body>
</html>
