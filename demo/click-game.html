<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击挑战 - 典哥出品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #f5576c;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .score-board {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .score-item {
            text-align: center;
        }
        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #f5576c;
        }
        .score-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .click-area {
            margin: 30px 0;
        }
        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            outline: none;
            user-select: none;
        }
        .click-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }
        .click-btn:active {
            transform: scale(0.95);
        }
        .click-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            font-size: 1.2em;
            color: #666;
            margin: 20px 0;
            min-height: 30px;
        }
        .controls {
            margin-top: 30px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="emoji">👆</div>
        <h1>点击挑战</h1>
        <p class="subtitle">10 秒钟，看你能点多少次！</p>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-value" id="score">0</div>
                <div class="score-label">点击次数</div>
            </div>
            <div class="score-item">
                <div class="score-value" id="time">10</div>
                <div class="score-label">剩余时间</div>
            </div>
            <div class="score-item">
                <div class="score-value" id="best">0</div>
                <div class="score-label">最佳记录</div>
            </div>
        </div>
        
        <div class="message" id="message">准备好了吗？点击按钮开始！</div>
        
        <div class="click-area">
            <button class="click-btn" id="clickBtn" onclick="handleClick()">
                开始！
            </button>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="startGame()">🔄 再来一局</button>
            <button class="btn btn-secondary" onclick="resetGame()">🔧 重置</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 10;
        let gameActive = false;
        let bestScore = 0;
        let timer = null;

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('best').textContent = bestScore;
        }

        function handleClick() {
            if (!gameActive) {
                startGame();
                return;
            }
            
            score++;
            updateDisplay();
            
            // 随机显示鼓励的话
            const messages = ['加油！', '快点！', '太棒了！', '继续！', '💪', '🔥', '⚡'];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('message').textContent = randomMsg;
        }

        function startGame() {
            if (gameActive) return;
            
            score = 0;
            timeLeft = 10;
            gameActive = true;
            updateDisplay();
            
            document.getElementById('clickBtn').textContent = '点我！';
            document.getElementById('message').textContent = '快快快！疯狂点击！';
            
            // 开始倒计时
            timer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);
            
            // 更新最佳记录
            if (score > bestScore) {
                bestScore = score;
                document.getElementById('message').textContent = `🎉 新记录！${score} 次！`;
            } else {
                document.getElementById('message').textContent = `时间到！${score} 次`;
            }
            
            document.getElementById('clickBtn').textContent = '再来！';
            updateDisplay();
        }

        function resetGame() {
            score = 0;
            timeLeft = 10;
            gameActive = false;
            clearInterval(timer);
            
            document.getElementById('clickBtn').textContent = '开始！';
            document.getElementById('message').textContent = '准备好了吗？点击按钮开始！';
            updateDisplay();
        }

        // 初始化
        updateDisplay();
    </script>
</body>
</html>
