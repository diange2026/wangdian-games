<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - 经典数字合并</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .scores {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .message {
            text-align: center;
            font-size: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
        </div>

        <div class="scores">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>

        <div class="game-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="message" id="message"></div>

        <div class="controls">
            <button class="btn" onclick="initGame()">🔄 新游戏</button>
        </div>

        <div class="instructions">
            <strong>玩法说明：</strong><br>
            使用方向键或滑动屏幕移动方块<br>
            相同数字碰撞时合并<br>
            目标是合成 2048！
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('2048-best') || 0;

        function initGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            document.getElementById('best').textContent = best;
            document.getElementById('message').classList.remove('show');
            addNewTile();
            addNewTile();
            renderGrid();
        }

        function addNewTile() {
            const empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) empty.push({i, j});
                }
            }
            if (empty.length > 0) {
                const {i, j} = empty[Math.floor(Math.random() * empty.length)];
                grid[i][j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[i][j] !== 0) {
                        cell.textContent = grid[i][j];
                        cell.dataset.value = grid[i][j];
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function move(direction) {
            let moved = false;
            const newGrid = grid.map(row => [...row]);

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let row = grid[i].filter(x => x !== 0);
                    if (direction === 'right') row.reverse();
                    
                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            score += row[j];
                            row.splice(j + 1, 1);
                        }
                    }
                    
                    while (row.length < 4) row.push(0);
                    if (direction === 'right') row.reverse();
                    
                    if (row.join(',') !== grid[i].join(',')) moved = true;
                    newGrid[i] = row;
                }
            } else {
                for (let j = 0; j < 4; j++) {
                    let col = grid.map(row => row[j]).filter(x => x !== 0);
                    if (direction === 'down') col.reverse();
                    
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i + 1, 1);
                        }
                    }
                    
                    while (col.length < 4) col.push(0);
                    if (direction === 'down') col.reverse();
                    
                    for (let i = 0; i < 4; i++) {
                        if (newGrid[i][j] !== col[i]) moved = true;
                        newGrid[i][j] = col[i];
                    }
                }
            }

            if (moved) {
                grid = newGrid;
                addNewTile();
                renderGrid();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return;
                    if (j < 3 && grid[i][j] === grid[i][j + 1]) return;
                    if (i < 3 && grid[i][j] === grid[i + 1][j]) return;
                }
            }
            
            if (score > best) {
                best = score;
                localStorage.setItem('2048-best', best);
            }
            
            const msg = document.getElementById('message');
            msg.innerHTML = `游戏结束！<br>最终分数：${score}`;
            msg.classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });

        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) move('right');
                else if (dx < -30) move('left');
            } else {
                if (dy > 30) move('down');
                else if (dy < -30) move('up');
            }
        });

        document.getElementById('best').textContent = best;
        initGame();
    </script>
</body>
</html>
