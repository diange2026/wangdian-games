<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平衡大师 - 物理堆叠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.3); border-radius: 15px; }
        .controls { margin-top: 20px; }
        .btn { padding: 15px 40px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        .instructions { margin-top: 20px; font-size: 14px; opacity: 0.9; text-align: center; max-width: 500px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="title">⚖️ 平衡大师</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">高度</div><div class="stat-value" id="height">0</div></div>
        <div class="stat-box"><div class="stat-label">最佳</div><div class="stat-value" id="best">0</div></div>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="controls">
        <button class="btn" onclick="dropBlock()">⬇️ 放置方块</button>
        <button class="btn" onclick="resetGame()">🔄 重新开始</button>
    </div>
    <div class="instructions">
        <strong>玩法说明：</strong><br>
        移动的方块到达理想位置时点击放置<br>
        堆叠越高分数越高，但要小心保持平衡！<br>
        方块掉落游戏结束
    </div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        let blocks=[], currentBlock={x:150, y:50, w:80, h:30, dir:2, speed:2}, score=0, height=0, best=0, gameOver=false, gameStarted=false;
        function resetGame() { blocks=[]; currentBlock={x:150, y:50, w:80, h:30, dir:2, speed:2}; score=0; height=0; gameOver=false; gameStarted=true; document.getElementById('score').textContent='0'; document.getElementById('height').textContent='0'; }
        function dropBlock() {
            if(gameOver||!gameStarted) return;
            blocks.push({...currentBlock, vy:0});
            score+=10; height=blocks.length;
            document.getElementById('score').textContent=score;
            document.getElementById('height').textContent=height;
            if(height>best) { best=height; document.getElementById('best').textContent=best; }
            currentBlock.w=Math.max(30, currentBlock.w-5);
            currentBlock.x=150; currentBlock.y=50;
            currentBlock.speed+=0.3;
        }
        function update() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='rgba(255,255,255,0.1)';
            ctx.fillRect(100,0,1,canvas.height);
            ctx.fillRect(299,0,1,canvas.height);
            blocks.forEach(b=>{ ctx.fillStyle='#667eea'; ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeStyle='#fff'; ctx.strokeRect(b.x,b.y,b.w,b.h); });
            if(gameStarted&&!gameOver) {
                currentBlock.x+=currentBlock.dir*currentBlock.speed;
                if(currentBlock.x<=100||currentBlock.x+currentBlock.w>=300) currentBlock.dir*=-1;
                ctx.fillStyle='#FF6B6B';
                ctx.fillRect(currentBlock.x,currentBlock.y,currentBlock.w,currentBlock.h);
                ctx.strokeStyle='#fff';
                ctx.strokeRect(currentBlock.x,currentBlock.y,currentBlock.w,currentBlock.h);
            }
            if(blocks.length>0) {
                const topBlock=blocks[blocks.length-1];
                if(topBlock.y<450) {
                    topBlock.y+=2;
                } else {
                    currentBlock.y=topBlock.y-currentBlock.h;
                    const overlapX=Math.max(currentBlock.x, topBlock.x);
                    const overlapW=Math.min(currentBlock.x+currentBlock.w, topBlock.x+topBlock.w)-overlapX;
                    if(overlapW>10) {
                        currentBlock.x=overlapX;
                        currentBlock.w=overlapW;
                    } else { gameOver=true; }
                }
            }
            requestAnimationFrame(update);
        }
        canvas.addEventListener('click',dropBlock);
        document.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='ArrowDown') dropBlock(); });
        resetGame(); update();
    </script>
</body>
</html>
