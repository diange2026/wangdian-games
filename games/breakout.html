<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块 - 经典街机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 36px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.3); border-radius: 15px; }
        .controls { margin-top: 20px; }
        .btn {
            padding: 12px 30px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin: 5px;
        }
        .message { margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; display: none; }
        .message.show { display: block; }
    </style>
</head>
<body>
    <div class="title">🧱 打砖块</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">生命</div><div class="stat-value" id="lives">3</div></div>
        <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
    </div>
    <canvas id="gameCanvas" width="480" height="400"></canvas>
    <div class="message" id="message"></div>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始游戏</button>
        <button class="btn" onclick="togglePause()">⏸️ 暂停</button>
    </div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const paddleWidth=100, paddleHeight=10, ballRadius=8;
        const brickRowCount=5, brickColumnCount=8, brickWidth=55, brickHeight=20, brickPadding=5, brickOffsetTop=40, brickOffsetLeft=5;
        let paddleX=(canvas.width-paddleWidth)/2, ballX=canvas.width/2, ballY=canvas.height-30, ballDX=3, ballDY=-3;
        let bricks=[], score=0, lives=3, level=1, gameRunning=false, isPaused=false, animationId=null;
        function initBricks() {
            bricks=[];
            for(let c=0;c<brickColumnCount;c++) {
                bricks[c]=[];
                for(let r=0;r<brickRowCount;r++) bricks[c][r]={x:0, y:0, status:1};
            }
        }
        function drawBall() { ctx.beginPath(); ctx.arc(ballX,ballY,ballRadius,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.closePath(); }
        function drawPaddle() { ctx.beginPath(); ctx.rect(paddleX,canvas.height-paddleHeight,paddleWidth,paddleHeight); ctx.fillStyle='#FF6B6B'; ctx.fill(); ctx.closePath(); }
        function drawBricks() {
            for(let c=0;c<brickColumnCount;c++) {
                for(let r=0;r<brickRowCount;r++) {
                    if(bricks[c][r].status===1) {
                        const brickX=(c*(brickWidth+brickPadding))+brickOffsetLeft;
                        const brickY=(r*(brickHeight+brickPadding))+brickOffsetTop;
                        bricks[c][r].x=brickX; bricks[c][r].y=brickY;
                        ctx.beginPath(); ctx.rect(brickX,brickY,brickWidth,brickHeight);
                        ctx.fillStyle=`hsl(${c*45}, 70%, 60%)`; ctx.fill(); ctx.closePath();
                    }
                }
            }
        }
        function collisionDetection() {
            for(let c=0;c<brickColumnCount;c++) {
                for(let r=0;r<brickRowCount;r++) {
                    const b=bricks[c][r];
                    if(b.status===1&&ballX>b.x&&ballX<b.x+brickWidth&&ballY>b.y&&ballY<b.y+brickHeight) {
                        ballDY=-ballDY; b.status=0; score+=10;
                        document.getElementById('score').textContent=score;
                        if(score===brickRowCount*brickColumnCount*10) {
                            level++; document.getElementById('level').textContent=level;
                            initBricks(); ballDX=ballDX>0?ballDX+0.5:ballDX-0.5; ballDY=ballDY>0?ballDY+0.5:ballDY-0.5;
                        }
                    }
                }
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawBricks(); drawBall(); drawPaddle(); collisionDetection();
            if(ballX+ballDX>canvas.width-ballRadius||ballX+ballDX<ballRadius) ballDX=-ballDX;
            if(ballY+ballDY<ballRadius) ballDY=-ballDY;
            else if(ballY+ballDY>canvas.height-ballRadius) {
                if(ballX>paddleX&&ballX<paddleX+paddleWidth) ballDY=-ballDY*1.05;
                else { lives--; document.getElementById('lives').textContent=lives;
                    if(!lives) { gameOver(); return; }
                    else { ballX=canvas.width/2; ballY=canvas.height-30; ballDX=3; ballDY=-3; paddleX=(canvas.width-paddleWidth)/2; }
                }
            }
            if(ballX+ballDX>canvas.width-ballRadius||ballX+ballDX<ballRadius) ballDX=-ballDX;
            ballX+=ballDX; ballY+=ballDY;
            if(paddleX<0) paddleX=0;
            else if(paddleX+paddleWidth>canvas.width) paddleX=canvas.width-paddleWidth;
            if(!isPaused) animationId=requestAnimationFrame(draw);
        }
        function startGame() {
            if(animationId) cancelAnimationFrame(animationId);
            score=0; lives=3; level=1;
            document.getElementById('score').textContent='0';
            document.getElementById('lives').textContent='3';
            document.getElementById('level').textContent='1';
            document.getElementById('message').classList.remove('show');
            initBricks(); gameRunning=true; isPaused=false; draw();
        }
        function gameOver() {
            gameRunning=false;
            document.getElementById('message').innerHTML='💥 游戏结束！<br>最终分数：'+score;
            document.getElementById('message').classList.add('show');
        }
        function togglePause() { isPaused=!isPaused; if(!isPaused) draw(); }
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowRight') paddleX+=25;
            else if(e.key==='ArrowLeft') paddleX-=25;
        });
        canvas.addEventListener('mousemove',e=>{
            const relativeX=e.clientX-canvas.offsetLeft;
            if(relativeX>0&&relativeX<canvas.width) paddleX=relativeX-paddleWidth/2;
        });
        initBricks(); drawPaddle();
    </script>
</body>
</html>
