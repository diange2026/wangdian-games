<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>抓大鹅 - 3D 堆叠消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow: hidden; padding: 20px; color: #fff; touch-action: manipulation; }
        .header { text-align: center; margin-bottom: 15px; }
        .title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }
        .stats { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 12px; text-align: center; min-width: 80px; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .game-container { position: relative; max-width: 500px; margin: 0 auto; perspective: 1000px; }
        .game-board { position: relative; width: 100%; height: 400px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; transform-style: preserve-3d; }
        .item { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fff, #e6e6e6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transform-style: preserve-3d; border: 3px solid rgba(255,255,255,0.3); }
        .item:hover { transform: scale(1.1) translateZ(20px); z-index: 100 !important; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .item.selected { transform: scale(1.15) translateZ(30px); box-shadow: 0 0 30px rgba(255,255,0,0.8); border-color: #FFD700; z-index: 100 !important; }
        .item.matched { animation: matchPop 0.5s forwards; }
        @keyframes matchPop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
        .slot-bar { display: flex; gap: 10px; justify-content: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-top: 15px; min-height: 80px; }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 2px dashed rgba(255,255,255,0.3); transition: all 0.3s; }
        .slot.filled { border-style: solid; background: rgba(255,255,255,0.2); }
        .slot.match { animation: slotMatch 0.4s; background: rgba(255,255,0,0.3); }
        @keyframes slotMatch { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 25px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; display: none; }
        .message.show { display: block; animation: popIn 0.3s; }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .message h2 { font-size: 36px; margin-bottom: 20px; }
        .audio-control { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <div class="audio-control" onclick="toggleAudio()">🔊</div>
    <div class="header">
        <div class="title">🦢 抓大鹅 3D</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
            <div class="stat-box"><div class="stat-label">消除</div><div class="stat-value" id="matched">0</div></div>
            <div class="stat-box"><div class="stat-label">剩余</div><div class="stat-value" id="remaining">0</div></div>
            <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">0s</div></div>
        </div>
    </div>
    <div class="game-container">
        <div class="game-board" id="gameBoard"></div>
        <div class="slot-bar" id="slotBar">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始</button>
        <button class="btn" onclick="shuffleBoard()">🔀 重排</button>
        <button class="btn" onclick="undoMove()">↩️ 撤销</button>
    </div>
    <div class="message" id="message">
        <h2 id="msgTitle">🎉 恭喜！</h2>
        <p id="msgText">关卡完成！</p>
        <button class="btn" onclick="nextLevel()" style="margin-top:20px;">下一关</button>
    </div>
    <script>
        const emojis=['🦢','🐥','🐰','🐱','🐶','🐸','🐵','🦊','🐼','🦁','🐮','🐷','🐨','🐯','🦄','🐞','🐢','🐬','🦋','🐝'];
        let items=[], slots=[], level=1, matchedCount=0, timer=0, timerInterval=null, gameActive=false, moveHistory=[], audioEnabled=true;
        let bgm=null, sfx={pop:null,match:null,win:null};
        function initAudio() {
            const AudioContext=window.AudioContext||window.webkitAudioContext;
            const ctx=new AudioContext();
            sfx.pop=createSound(ctx,523.25,0.1,'sine');
            sfx.match=createSound(ctx,659.25,0.2,'square');
            sfx.win=createSound(ctx,783.99,0.5,'triangle');
        }
        function createSound(ctx,freq,duration,type) {
            return ()=>{ if(!audioEnabled) return; const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=freq; osc.type=type; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+duration); osc.start(); osc.stop(ctx.currentTime+duration); };
        }
        function toggleAudio() { audioEnabled=!audioEnabled; document.querySelector('.audio-control').textContent=audioEnabled?'🔊':'🔇'; }
        function startGame() {
            if(!bgm) initAudio();
            items=[]; slots=Array(7).fill(null); moveHistory=[]; matchedCount=0; timer=0; gameActive=true;
            document.getElementById('level').textContent=level;
            document.getElementById('matched').textContent='0';
            document.getElementById('message').classList.remove('show');
            if(timerInterval) clearInterval(timerInterval);
            timerInterval=setInterval(()=>{ timer++; document.getElementById('timer').textContent=timer+'s'; },1000);
            generateItems(6+level*2);
            renderBoard();
            renderSlots();
        }
        function generateItems(numTypes) {
            const selected=emojis.slice(0,numTypes);
            items=[];
            selected.forEach(emoji=>{
                const count=3+Math.floor(Math.random()*3);
                for(let i=0;i<count;i++) items.push({emoji, id:Math.random().toString(36).substr(2,9), x:0, y:0, z:0, selected:false });
            });
            items.sort(()=>Math.random()-0.5);
            items.forEach((item,i)=>{
                const col=i%7, row=Math.floor(i/7);
                item.x=col*65+20+Math.random()*20;
                item.y=row*65+20+Math.random()*20;
                item.z=Math.floor(i/7);
            });
        }
        function renderBoard() {
            const board=document.getElementById('gameBoard');
            board.innerHTML='';
            items.forEach((item,i)=>{
                if(item.matched) return;
                const el=document.createElement('div');
                el.className='item'+(item.selected?' selected':'');
                el.textContent=item.emoji;
                el.style.left=item.x+'px';
                el.style.top=item.y+'px';
                el.style.zIndex=item.z;
                el.onclick=()=>selectItem(item);
                board.appendChild(el);
                item.el=el;
            });
            document.getElementById('remaining').textContent=items.filter(i=>!i.matched).length;
        }
        function renderSlots() {
            const bar=document.getElementById('slotBar');
            bar.innerHTML='';
            for(let i=0;i<7;i++) {
                const slot=document.createElement('div');
                slot.className='slot'+(slots[i]?' filled':'');
                slot.textContent=slots[i]?slots[i].emoji:'';
                if(slots[i]&&i>0&&slots[i]&&slots[i-1]&&slots[i].emoji===slots[i-1].emoji&&slots[i-2]&&slots[i-1].emoji===slots[i-2].emoji) {
                    slot.classList.add('match');
                }
                bar.appendChild(slot);
            }
        }
        function selectItem(item) {
            if(!gameActive||item.selected||item.matched) return;
            const emptyIndex=slots.findIndex(s=>s===null);
            if(emptyIndex===-1) return;
            moveHistory.push({type:'select', item, slotIndex:emptyIndex});
            item.selected=true;
            slots[emptyIndex]=item;
            sfx.pop();
            renderBoard();
            renderSlots();
            checkMatch();
        }
        function checkMatch() {
            for(let i=2;i<slots.length;i++) {
                if(slots[i]&&slots[i-1]&&slots[i-2]&&slots[i].emoji===slots[i-1].emoji&&slots[i-1].emoji===slots[i-2].emoji) {
                    setTimeout(()=>{
                        slots[i].matched=true; slots[i-1].matched=true; slots[i-2].matched=true;
                        slots[i].el.classList.add('matched'); slots[i-1].el.classList.add('matched'); slots[i-2].el.classList.add('matched');
                        matchedCount+=3;
                        document.getElementById('matched').textContent=matchedCount;
                        sfx.match();
                        slots[i]=null; slots[i-1]=null; slots[i-2]=null;
                        renderSlots();
                        renderBoard();
                        checkWin();
                    },300);
                    return;
                }
            }
        }
        function checkWin() {
            const remaining=items.filter(i=>!i.matched).length;
            if(remaining===0) {
                gameActive=false; clearInterval(timerInterval);
                sfx.win();
                document.getElementById('msgTitle').textContent='🎉 恭喜！';
                document.getElementById('msgText').textContent=`关卡${level}完成！用时${timer}秒`;
                document.getElementById('message').classList.add('show');
            } else if(slots.filter(s=>s).length===7) {
                gameActive=false; clearInterval(timerInterval);
                document.getElementById('msgTitle').textContent='😢 游戏结束';
                document.getElementById('msgText').textContent='槽位已满！';
                document.getElementById('message').classList.add('show');
            }
        }
        function shuffleBoard() {
            if(!gameActive) return;
            const unselected=items.filter(i=>!i.selected&&!i.matched);
            unselected.forEach(item=>{
                item.x=Math.random()*400+20;
                item.y=Math.random()*300+20;
            });
            renderBoard();
            moveHistory.push({type:'shuffle'});
        }
        function undoMove() {
            if(!gameActive||moveHistory.length===0) return;
            const last=moveHistory.pop();
            if(last.type==='select') {
                last.item.selected=false;
                slots[last.slotIndex]=null;
                renderBoard();
                renderSlots();
            }
        }
        function nextLevel() { level++; startGame(); }
        startGame();
    </script>
</body>
</html>
