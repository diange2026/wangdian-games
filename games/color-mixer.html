<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色混合大师 - 创新调色</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; text-align: center; }
        .game-area { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
        .color-box {
            width: 200px; height: 200px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .target { border: 4px solid #fff; }
        .controls { background: rgba(255,255,255,0.2); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .slider-group { margin: 20px 0; }
        .slider-label { font-size: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .slider { width: 300px; height: 10px; -webkit-appearance: none; border-radius: 5px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; }
        #redSlider { background: linear-gradient(to right, #000, #f00); }
        #redSlider::-webkit-slider-thumb { background: #f00; }
        #greenSlider { background: linear-gradient(to right, #000, #0f0); }
        #greenSlider::-webkit-slider-thumb { background: #0f0; }
        #blueSlider { background: linear-gradient(to right, #000, #00f); }
        #blueSlider::-webkit-slider-thumb { background: #00f; }
        .btn {
            padding: 15px 40px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 15px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin: 10px;
        }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .message { padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; margin: 20px 0; display: none; }
        .message.show { display: block; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="title">🎨 颜色混合大师</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">完美数</div><div class="stat-value" id="perfect">0</div></div>
    </div>
    <div class="game-area">
        <div class="color-box target" id="targetColor">目标颜色</div>
        <div class="color-box" id="mixedColor">混合结果</div>
    </div>
    <div class="controls">
        <div class="slider-group">
            <div class="slider-label"><span>🔴 红色</span><span id="redValue">0</span></div>
            <input type="range" class="slider" id="redSlider" min="0" max="255" value="0">
        </div>
        <div class="slider-group">
            <div class="slider-label"><span>🟢 绿色</span><span id="greenValue">0</span></div>
            <input type="range" class="slider" id="greenSlider" min="0" max="255" value="0">
        </div>
        <div class="slider-group">
            <div class="slider-label"><span>🔵 蓝色</span><span id="blueValue">0</span></div>
            <input type="range" class="slider" id="blueSlider" min="0" max="255" value="0">
        </div>
    </div>
    <div class="message" id="message"></div>
    <button class="btn" onclick="submitColor()">✅ 提交答案</button>
    <button class="btn" onclick="nextLevel()">⏭️ 下一关</button>
    <script>
        let level=1, score=0, perfect=0, targetRGB={r:0, g:0, b:0};
        function randomColor() {
            return {
                r: Math.floor(Math.random()*256),
                g: Math.floor(Math.random()*256),
                b: Math.floor(Math.random()*256)
            };
        }
        function colorDistance(c1, c2) {
            return Math.sqrt(Math.pow(c1.r-c2.r,2)+Math.pow(c1.g-c2.g,2)+Math.pow(c1.b-c2.b,2));
        }
        function rgbToHex(r,g,b) {
            return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
        }
        function initLevel() {
            targetRGB=randomColor();
            document.getElementById('targetColor').style.background=rgbToHex(targetRGB.r,targetRGB.g,targetRGB.b);
            document.getElementById('redSlider').value=0;
            document.getElementById('greenSlider').value=0;
            document.getElementById('blueSlider').value=0;
            updateMixed();
            document.getElementById('message').classList.remove('show');
        }
        function updateMixed() {
            const r=parseInt(document.getElementById('redSlider').value);
            const g=parseInt(document.getElementById('greenSlider').value);
            const b=parseInt(document.getElementById('blueSlider').value);
            document.getElementById('redValue').textContent=r;
            document.getElementById('greenValue').textContent=g;
            document.getElementById('blueValue').textContent=b;
            document.getElementById('mixedColor').style.background=rgbToHex(r,g,b);
        }
        function submitColor() {
            const r=parseInt(document.getElementById('redSlider').value);
            const g=parseInt(document.getElementById('greenSlider').value);
            const b=parseInt(document.getElementById('blueSlider').value);
            const current={r,g,b};
            const distance=colorDistance(current,targetRGB);
            const accuracy=Math.max(0, Math.round(100-(distance/441)*100));
            const msg=document.getElementById('message');
            msg.innerHTML=`匹配度：<strong>${accuracy}%</strong><br>距离：${Math.round(distance)}`;
            msg.classList.add('show');
            if(accuracy>=95) { score+=100+(level*10); perfect++; msg.innerHTML+='🏆 完美匹配！'; }
            else if(accuracy>=80) { score+=50; msg.innerHTML+='✅ 很好！'; }
            else if(accuracy>=60) { score+=20; msg.innerHTML+='👍 不错！'; }
            else { msg.innerHTML+='💪 继续加油！'; }
            document.getElementById('score').textContent=score;
            document.getElementById('level').textContent=level;
            document.getElementById('perfect').textContent=perfect;
        }
        function nextLevel() { level++; initLevel(); }
        ['redSlider','greenSlider','blueSlider'].forEach(id=>{
            document.getElementById(id).addEventListener('input',updateMixed);
        });
        initLevel();
    </script>
</body>
</html>
