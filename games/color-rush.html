<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩冲刺 - 颜色匹配</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.3); border-radius: 15px; }
        .color-indicator { width: 100px; height: 100px; border-radius: 50%; margin: 20px; border: 4px solid #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .controls { margin-top: 20px; }
        .btn { padding: 15px 40px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <div class="title">🌈 色彩冲刺</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">连击</div><div class="stat-value" id="combo">0</div></div>
        <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">60s</div></div>
    </div>
    <div class="color-indicator" id="targetColor"></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始</button>
        <button class="btn" onclick="collect('red')">🔴 红</button>
        <button class="btn" onclick="collect('green')">🟢 绿</button>
        <button class="btn" onclick="collect('blue')">🔵 蓝</button>
        <button class="btn" onclick="collect('yellow')">🟡 黄</button>
    </div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const COLORS={red:'#f44336', green:'#4CAF50', blue:'#2196F3', yellow:'#FFC107'};
        let particles=[], score=0, combo=0, timeLeft=60, gameRunning=false, targetColor='red', spawnRate=800, lastSpawn=0;
        function startGame() {
            particles=[]; score=0; combo=0; timeLeft=60; gameRunning=true;
            document.getElementById('score').textContent='0';
            document.getElementById('combo').textContent='0';
            document.getElementById('timer').textContent='60s';
            changeTargetColor();
            lastSpawn=Date.now();
            gameLoop();
            const timerInterval=setInterval(()=>{
                timeLeft--;
                document.getElementById('timer').textContent=timeLeft+'s';
                if(timeLeft<=0) { clearInterval(timerInterval); gameRunning=false; alert(`时间到！最终分数：${score}`); }
            },1000);
        }
        function changeTargetColor() {
            const keys=Object.keys(COLORS);
            targetColor=keys[Math.floor(Math.random()*keys.length)];
            document.getElementById('targetColor').style.background=COLORS[targetColor];
        }
        function spawnParticle() {
            const keys=Object.keys(COLORS);
            const color=keys[Math.floor(Math.random()*keys.length)];
            particles.push({
                x: Math.random()*360+20, y: -20,
                vx: (Math.random()-0.5)*2, vy: Math.random()*2+2,
                r: Math.random()*15+15, color: color
            });
        }
        function collect(color) {
            if(!gameRunning) return;
            const hitIndex=particles.findIndex(p=>p.color===color&&p.y>50&&p.y<350);
            if(hitIndex!==-1) {
                if(color===targetColor) {
                    score+=10+combo; combo++;
                    document.getElementById('score').textContent=score;
                    document.getElementById('combo').textContent=combo;
                    changeTargetColor();
                } else { combo=0; document.getElementById('combo').textContent='0'; }
                particles.splice(hitIndex,1);
            }
        }
        function gameLoop() {
            if(!gameRunning) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(Date.now()-lastSpawn>spawnRate) { spawnParticle(); lastSpawn=Date.now(); spawnRate=Math.max(300,spawnRate-10); }
            particles.forEach((p,i)=>{
                p.x+=p.vx; p.y+=p.vy;
                if(p.y>420) particles.splice(i,1);
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle=COLORS[p.color]; ctx.fill();
            });
            requestAnimationFrame(gameLoop);
        }
        document.addEventListener('keydown',e=>{
            if(e.key==='d'||e.key==='D') collect('red');
            else if(e.key==='f'||e.key==='F') collect('green');
            else if(e.key==='j'||e.key==='J') collect('blue');
            else if(e.key==='k'||e.key==='K') collect('yellow');
        });
    </script>
</body>
</html>
