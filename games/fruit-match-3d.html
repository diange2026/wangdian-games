<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 水果连连看 - 立体消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; overflow: hidden; padding: 20px; color: #fff; }
        .header { text-align: center; margin-bottom: 15px; }
        .title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }
        .stats { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 12px; text-align: center; min-width: 80px; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .game-container { position: relative; max-width: 500px; margin: 0 auto; perspective: 1000px; }
        .game-board { position: relative; width: 100%; height: 450px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; transform-style: preserve-3d; }
        .fruit { position: absolute; width: 55px; height: 55px; background: linear-gradient(145deg, #fff, #e6e6e6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 3px solid rgba(255,255,255,0.3); }
        .fruit:hover { transform: scale(1.15); z-index: 100 !important; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .fruit.selected { transform: scale(1.2); box-shadow: 0 0 30px rgba(255,255,0,0.8); border-color: #FFD700; z-index: 100 !important; }
        .fruit.matched { animation: fruitPop 0.5s forwards; }
        @keyframes fruitPop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
        .line { position: absolute; height: 4px; background: linear-gradient(90deg, transparent, #FFD700, transparent); transform-origin: left center; pointer-events: none; z-index: 50; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 25px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; display: none; }
        .message.show { display: block; animation: popIn 0.3s; }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .audio-control { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; }
        .combo { position: fixed; font-size: 32px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 200; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.3); } }
    </style>
</head>
<body>
    <div class="audio-control" onclick="toggleAudio()">🔊</div>
    <div class="header">
        <div class="title">🍎 3D 水果连连看</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
            <div class="stat-box"><div class="stat-label">消除</div><div class="stat-value" id="matched">0</div></div>
            <div class="stat-box"><div class="stat-label">连击</div><div class="stat-value" id="combo">0</div></div>
            <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">0s</div></div>
        </div>
    </div>
    <div class="game-container">
        <div class="game-board" id="gameBoard"></div>
    </div>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始</button>
        <button class="btn" onclick="shuffleBoard()">🔀 重排</button>
        <button class="btn" onclick="useHint()">💡 提示</button>
    </div>
    <div class="message" id="message">
        <h2 id="msgTitle">🎉 恭喜！</h2>
        <p id="msgText">关卡完成！</p>
        <button class="btn" onclick="nextLevel()" style="margin-top:20px;">下一关</button>
    </div>
    <script>
        const fruits=['🍎','🍊','🍋','🍓','🍑','🍒','🍇','🍉','🍌','🍐','🥝','🍍','🥭','🍈','🍅'];
        let items=[], selected=null, matchedCount=0, combo=0, level=1, timer=0, timerInterval=null, gameActive=false, audioEnabled=true, ctx=null;
        function initAudio() {
            const AudioContext=window.AudioContext||window.webkitAudioContext;
            ctx=new AudioContext();
        }
        function playSound(freq,type='sine') { if(!audioEnabled||!ctx) return; const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=freq; osc.type=type; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2); osc.start(); osc.stop(ctx.currentTime+0.2); }
        function toggleAudio() { audioEnabled=!audioEnabled; document.querySelector('.audio-control').textContent=audioEnabled?'🔊':'🔇'; }
        function startGame() {
            if(!ctx) initAudio();
            selected=null; matchedCount=0; combo=0; timer=0; gameActive=true;
            document.getElementById('level').textContent=level;
            document.getElementById('matched').textContent='0';
            document.getElementById('combo').textContent='0';
            document.getElementById('message').classList.remove('show');
            if(timerInterval) clearInterval(timerInterval);
            timerInterval=setInterval(()=>{ timer++; document.getElementById('timer').textContent=timer+'s'; },1000);
            generateFruits(5+level);
            renderBoard();
        }
        function generateFruits(numTypes) {
            const selected=fruits.slice(0,numTypes);
            items=[];
            selected.forEach(fruit=>{
                const count=4+Math.floor(Math.random()*4);
                for(let i=0;i<count;i++) items.push({fruit, id:Math.random().toString(36).substr(2,9), x:0, y:0, z:0, matched:false });
            });
            items.sort(()=>Math.random()-0.5);
            items.forEach((item,i)=>{
                const col=i%8, row=Math.floor(i/8);
                item.x=col*58+30+Math.random()*15;
                item.y=row*58+30+Math.random()*15;
                item.z=Math.floor(i/8);
            });
        }
        function renderBoard() {
            const board=document.getElementById('gameBoard');
            board.innerHTML='';
            items.forEach(item=>{
                if(item.matched) return;
                const el=document.createElement('div');
                el.className='fruit'+(selected===item?' selected':'');
                el.textContent=item.fruit;
                el.style.left=item.x+'px';
                el.style.top=item.y+'px';
                el.style.zIndex=item.z;
                el.onclick=()=>selectFruit(item);
                board.appendChild(el);
                item.el=el;
            });
        }
        function selectFruit(item) {
            if(!gameActive||item.matched) return;
            if(selected===item) { selected=null; renderBoard(); return; }
            if(!selected) { selected=item; renderBoard(); playSound(523); return; }
            if(selected.fruit!==item.fruit) { selected=item; renderBoard(); playSound(523); return; }
            const line=document.createElement('div');
            line.className='line';
            line.style.left=selected.x+'px';
            line.style.top=(selected.y+27)+'px';
            line.style.width=Math.sqrt(Math.pow(item.x-selected.x,2)+Math.pow(item.y-selected.y,2))+'px';
            line.style.transform=`rotate(${Math.atan2(item.y-selected.y,item.x-selected.x)}rad)`;
            document.getElementById('gameBoard').appendChild(line);
            setTimeout(()=>{
                selected.matched=true; item.matched=true;
                selected.el.classList.add('matched'); item.el.classList.add('matched');
                matchedCount+=2; combo++;
                document.getElementById('matched').textContent=matchedCount;
                document.getElementById('combo').textContent=combo;
                playSound(659,'square');
                showCombo();
                selected=null;
                setTimeout(()=>{ line.remove(); renderBoard(); checkWin(); },500);
            },300);
        }
        function showCombo() {
            if(combo<2) return;
            const el=document.createElement('div');
            el.className='combo';
            el.textContent=combo>=5?`🔥${combo}连击!`:combo>=3?`${combo}连击!`:'';
            el.style.left=(Math.random()*200+150)+'px';
            el.style.top='200px';
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),800);
        }
        function shuffleBoard() {
            if(!gameActive) return;
            items.forEach(item=>{ if(!item.matched) { item.x=Math.random()*400+30; item.y=Math.random()*350+30; } });
            renderBoard();
            playSound(440);
        }
        function useHint() {
            if(!gameActive) return;
            const unmatched=items.filter(i=>!i.matched);
            for(let i=0;i<unmatched.length;i++) {
                for(let j=i+1;j<unmatched.length;j++) {
                    if(unmatched[i].fruit===unmatched[j].fruit) {
                        unmatched[i].el.style.boxShadow='0 0 30px #FFD700';
                        unmatched[j].el.style.boxShadow='0 0 30px #FFD700';
                        setTimeout(()=>renderBoard(),1500);
                        playSound(783);
                        return;
                    }
                }
            }
        }
        function checkWin() {
            const remaining=items.filter(i=>!i.matched).length;
            if(remaining===0) {
                gameActive=false; clearInterval(timerInterval);
                playSound(880,'triangle');
                document.getElementById('msgTitle').textContent='🎉 恭喜！';
                document.getElementById('msgText').textContent=`关卡${level}完成！${timer}秒 | ${combo}连击`;
                document.getElementById('message').classList.add('show');
            }
        }
        function nextLevel() { level++; startGame(); }
        startGame();
    </script>
</body>
</html>
