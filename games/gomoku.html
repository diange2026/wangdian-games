<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 双人对战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 36px; margin-bottom: 20px; }
        .status { font-size: 20px; margin-bottom: 20px; padding: 15px 30px; background: rgba(255,255,255,0.2); border-radius: 15px; }
        #gameCanvas { background: #f0d9b5; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 30px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer;
        }
        .message { margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; display: none; }
        .message.show { display: block; }
    </style>
</head>
<body>
    <div class="title">⚫ 五子棋</div>
    <div class="status" id="status">⚫ 黑棋的回合</div>
    <canvas id="gameCanvas" width="450" height="450"></canvas>
    <div class="message" id="message"></div>
    <div class="controls">
        <button class="btn" onclick="initGame(15)">🎯 标准 (15×15)</button>
        <button class="btn" onclick="initGame(19)">🎯 大型 (19×19)</button>
        <button class="btn" onclick="resetGame()">🔄 重新开始</button>
    </div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const CELL_SIZE=30, PADDING=15;
        let board=[], currentPlayer=1, gameActive=true, size=15, lastMove=null;
        function initGame(n) {
            size=n;
            canvas.width=CELL_SIZE*(size-1)+PADDING*2;
            canvas.height=CELL_SIZE*(size-1)+PADDING*2;
            board=Array(size).fill(null).map(()=>Array(size).fill(0));
            currentPlayer=1; gameActive=true; lastMove=null;
            document.getElementById('status').textContent='⚫ 黑棋的回合';
            document.getElementById('message').classList.remove('show');
            drawBoard();
        }
        function drawBoard() {
            ctx.fillStyle='#f0d9b5'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle='#8b4513'; ctx.lineWidth=1;
            for(let i=0;i<size;i++) {
                ctx.beginPath();
                ctx.moveTo(PADDING,PADDING+i*CELL_SIZE);
                ctx.lineTo(canvas.width-PADDING,PADDING+i*CELL_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(PADDING+i*CELL_SIZE,PADDING);
                ctx.lineTo(PADDING+i*CELL_SIZE,canvas.height-PADDING);
                ctx.stroke();
            }
            for(let r=0;r<size;r++) {
                for(let c=0;c<size;c++) {
                    if(board[r][c]!==0) drawPiece(r,c,board[r][c]);
                }
            }
            if(lastMove) {
                ctx.strokeStyle='#ff0000'; ctx.lineWidth=2;
                ctx.beginPath();
                ctx.arc(PADDING+lastMove.c*CELL_SIZE,PADDING+lastMove.r*CELL_SIZE,5,0,Math.PI*2);
                ctx.stroke();
            }
        }
        function drawPiece(r,c,player) {
            ctx.beginPath();
            ctx.arc(PADDING+c*CELL_SIZE,PADDING+r*CELL_SIZE,CELL_SIZE/2-2,0,Math.PI*2);
            ctx.fillStyle=player===1?'#000':'#fff';
            ctx.fill();
            if(player===2) { ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke(); }
        }
        function handleClick(e) {
            if(!gameActive) return;
            const rect=canvas.getBoundingClientRect();
            const x=e.clientX-rect.left, y=e.clientY-rect.top;
            const c=Math.round((x-PADDING)/CELL_SIZE);
            const r=Math.round((y-PADDING)/CELL_SIZE);
            if(r<0||r>=size||c<0||c>=size||board[r][c]!==0) return;
            board[r][c]=currentPlayer; lastMove={r,c};
            drawBoard();
            if(checkWin(r,c)) {
                gameActive=false;
                const winner=currentPlayer===1?'黑棋':'白棋';
                document.getElementById('status').textContent=`🎉 ${winner}获胜！`;
                document.getElementById('message').innerHTML=`🎉 ${winner}获胜！`;
                document.getElementById('message').classList.add('show');
            } else {
                currentPlayer=currentPlayer===1?2:1;
                document.getElementById('status').textContent=currentPlayer===1?'⚫ 黑棋的回合':'⚪ 白棋的回合';
            }
        }
        function checkWin(r,c) {
            const dirs=[[1,0],[0,1],[1,1],[1,-1]];
            return dirs.some(([dr,dc])=>{
                let count=1;
                for(let i=1;i<5;i++) {
                    const nr=r+dr*i, nc=c+dc*i;
                    if(nr<0||nr>=size||nc<0||nc>=size||board[nr][nc]!==currentPlayer) break;
                    count++;
                }
                for(let i=1;i<5;i++) {
                    const nr=r-dr*i, nc=c-dc*i;
                    if(nr<0||nr>=size||nc<0||nc>=size||board[nr][nc]!==currentPlayer) break;
                    count++;
                }
                return count>=5;
            });
        }
        function resetGame() { initGame(size); }
        canvas.addEventListener('click',handleClick);
        initGame(15);
    </script>
</body>
</html>
