<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引力弹球 - 物理益智</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.3); border-radius: 15px; }
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 30px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer;
        }
        .instructions { margin-top: 20px; font-size: 14px; opacity: 0.9; text-align: center; max-width: 500px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="title">🌌 引力弹球</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">弹射次数</div><div class="stat-value" id="shots">0</div></div>
    </div>
    <canvas id="gameCanvas" width="500" height="600"></canvas>
    <div class="controls">
        <button class="btn" onclick="resetLevel()">🔄 重置本关</button>
        <button class="btn" onclick="nextLevel()">⏭️ 下一关</button>
    </div>
    <div class="instructions">
        <strong>玩法说明：</strong><br>
        点击屏幕发射小球，利用引力源改变轨迹<br>
        击中绿色目标得分，避开红色障碍<br>
        每个关卡有发射次数限制，用完即止！
    </div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        let level=1, score=0, shots=0, maxShots=5, balls=[], gravities=[], targets=[], obstacles=[], gameActive=true;
        const G=0.5;
        function initLevel() {
            balls=[]; shots=0; gameActive=true;
            document.getElementById('shots').textContent=`${shots}/${maxShots}`;
            gravities=[{x:250, y:300, strength:500, color:'#FFD700'}];
            targets=[{x:Math.random()*400+50, y:Math.random()*100+50, r:25, color:'#4CAF50'}];
            obstacles=[];
            if(level>=2) obstacles.push({x:Math.random()*400+50, y:Math.random()*400+100, r:20, color:'#f44336'});
            if(level>=3) gravities.push({x:Math.random()*400+50, y:Math.random()*400+100, strength:-300, color:'#9C27B0'});
        }
        function spawnBall(x,y) {
            if(!gameActive||shots>=maxShots) return;
            balls.push({x, y, vx:(Math.random()-0.5)*4, vy:-Math.random()*8-4, r:8, color:'#00BCD4'});
            shots++; document.getElementById('shots').textContent=`${shots}/${maxShots}`;
        }
        function update() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            gravities.forEach(g=>{
                ctx.beginPath(); ctx.arc(g.x,g.y,15,0,Math.PI*2);
                ctx.fillStyle=g.color; ctx.fill();
                ctx.beginPath(); ctx.arc(g.x,g.y,25,0,Math.PI*2);
                ctx.strokeStyle=g.color+'40'; ctx.stroke();
            });
            targets.forEach((t,i)=>{
                ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
                ctx.fillStyle=t.color; ctx.fill();
            });
            obstacles.forEach(o=>{
                ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
                ctx.fillStyle=o.color; ctx.fill();
            });
            balls.forEach((b,bi)=>{
                gravities.forEach(g=>{
                    const dx=g.x-b.x, dy=g.y-b.y;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    const force=g.strength/(dist*dist);
                    b.vx+=dx/dist*force; b.vy+=dy/dist*force;
                });
                b.x+=b.vx; b.y+=b.vy;
                if(b.x<b.r||b.x>canvas.width-b.r) b.vx=-b.vx*0.8;
                if(b.y<b.r||b.y>canvas.height-b.r) b.vy=-b.vy*0.8;
                ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
                ctx.fillStyle=b.color; ctx.fill();
                targets.forEach((t,ti)=>{
                    const dx=t.x-b.x, dy=t.y-b.y;
                    if(Math.sqrt(dx*dx+dy*dy)<t.r+b.r) {
                        score+=50; document.getElementById('score').textContent=score;
                        targets.splice(ti,1);
                        if(targets.length===0) {
                            setTimeout(()=>{ level++; document.getElementById('level').textContent=level; maxShots=Math.max(3,8-level); initLevel(); },1000);
                        }
                    }
                });
                obstacles.forEach(o=>{
                    const dx=o.x-b.x, dy=o.y-b.y;
                    if(Math.sqrt(dx*dx+dy*dy)<o.r+b.r) {
                        balls.splice(bi,1);
                        if(balls.length===0&&targets.length>0&&shots>=maxShots) {
                            gameActive=false;
                            setTimeout(()=>alert('关卡失败！重试'),500);
                        }
                    }
                });
            });
            requestAnimationFrame(update);
        }
        function resetLevel() { initLevel(); }
        function nextLevel() { level++; maxShots=Math.max(3,8-level); initLevel(); }
        canvas.addEventListener('click',e=>{
            const rect=canvas.getBoundingClientRect();
            spawnBall(e.clientX-rect.left, e.clientY-rect.top);
        });
        initLevel(); update();
    </script>
</body>
</html>
