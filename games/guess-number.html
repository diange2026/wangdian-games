<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏 - 小 Q 出品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .message {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.1em;
            color: #333;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        input[type="number"] {
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 120px;
            text-align: center;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #888;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .history {
            margin-top: 20px;
            text-align: left;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .hint {
            color: #888;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="emoji">🎮</div>
        <h1>猜数字游戏</h1>
        <p class="subtitle">小 Q 出品 · 典哥专属版</p>
        
        <div class="message" id="message">
            我想好了一个 1-100 之间的数字，你来猜猜看！
        </div>
        
        <div class="input-area">
            <input type="number" id="guessInput" min="1" max="100" placeholder="1-100">
            <button onclick="makeGuess()">猜！</button>
        </div>
        
        <div class="hint">💡 输入数字后按回车或点击"猜！"按钮</div>
        
        <div class="history" id="history">
            <strong>猜测记录：</strong>
            <div id="historyList"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="attempts">0</div>
                <div class="stat-label">猜测次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="gamesPlayed">0</div>
                <div class="stat-label">已玩游戏</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bestScore">-</div>
                <div class="stat-label">最佳记录</div>
            </div>
        </div>
        
        <button onclick="resetGame()" style="margin-top: 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            🔄 再来一局
        </button>
    </div>

    <script>
        let targetNumber;
        let attempts;
        let gamesPlayed = 0;
        let bestScore = null;
        let guessHistory = [];

        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            guessHistory = [];
            updateMessage('我想好了一个 1-100 之间的数字，你来猜猜看！', '🎯');
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('guessInput').focus();
            updateHistory();
            updateStats();
        }

        function updateMessage(text, emoji) {
            document.getElementById('message').innerHTML = `<span style="font-size: 1.5em; margin-right: 10px;">${emoji}</span>${text}`;
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            if (guessHistory.length === 0) {
                historyList.innerHTML = '<em>还没有猜测记录</em>';
            } else {
                historyList.innerHTML = guessHistory.map((item, index) => 
                    `<div class="history-item">第${index + 1}次：${item.guess} - ${item.hint}</div>`
                ).join('');
            }
            historyList.parentElement.scrollTop = historyList.parentElement.scrollHeight;
        }

        function updateStats() {
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('gamesPlayed').textContent = gamesPlayed;
            document.getElementById('bestScore').textContent = bestScore || '-';
        }

        function makeGuess() {
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            
            if (isNaN(guess) || guess < 1 || guess > 100) {
                updateMessage('请输入 1-100 之间的有效数字！', '⚠️');
                return;
            }
            
            attempts++;
            let hint;
            let emoji;
            
            if (guess === targetNumber) {
                emoji = '🎉';
                hint = `恭喜你！答案就是 ${targetNumber}！`;
                gamesPlayed++;
                if (bestScore === null || attempts < bestScore) {
                    bestScore = attempts;
                }
                updateMessage(`${hint} 用了 ${attempts} 次猜测。`, emoji);
                input.disabled = true;
            } else if (guess < targetNumber) {
                emoji = '⬆️';
                hint = '太小了！再大一点！';
                updateMessage(hint, emoji);
            } else {
                emoji = '⬇️';
                hint = '太大了！再小一点！';
                updateMessage(hint, emoji);
            }
            
            guessHistory.push({ guess, hint });
            updateHistory();
            updateStats();
            
            if (guess !== targetNumber) {
                input.value = '';
                input.focus();
            }
        }

        function resetGame() {
            initGame();
        }

        // 支持回车键提交
        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                makeGuess();
            }
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
