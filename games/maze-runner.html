<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫生成器 - 动态逃脱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.3); border-radius: 15px; }
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .instructions { margin-top: 20px; font-size: 14px; opacity: 0.9; text-align: center; }
    </style>
</head>
<body>
    <div class="title">🌀 迷宫生成器</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
        <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">0s</div></div>
        <div class="stat-box"><div class="stat-label">步数</div><div class="stat-value" id="steps">0</div></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button class="btn" onclick="generateMaze(10)">🎯 简单</button>
        <button class="btn" onclick="generateMaze(15)">🎯 中等</button>
        <button class="btn" onclick="generateMaze(20)">🎯 困难</button>
        <button class="btn" onclick="newGame()">🔄 新迷宫</button>
    </div>
    <div class="instructions">⬆️⬇️⬅️➡️ 方向键移动 | 从绿色起点走到红色终点</div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        let maze=[], cellSize=20, player={x:0, y:0}, goal={x:0, y:0}, level=1, steps=0, timer=0, timerInterval=null;
        function generateMaze(size) {
            cellSize=Math.floor(400/size);
            maze=Array(size).fill(null).map(()=>Array(size).fill(1));
            const stack=[];
            const x=0, y=0;
            maze[y][x]=0;
            stack.push({x,y});
            while(stack.length>0) {
                const current=stack[stack.length-1];
                const neighbors=[];
                [[0,-2],[0,2],[-2,0],[2,0]].forEach(([dx,dy])=>{
                    const nx=current.x+dx, ny=current.y+dy;
                    if(nx>=0&&nx<size&&ny>=0&&ny<size&&maze[ny][nx]===1) neighbors.push({x:nx, y:ny, dx:dx/2, dy:dy/2});
                });
                if(neighbors.length>0) {
                    const next=neighbors[Math.floor(Math.random()*neighbors.length)];
                    maze[next.y][next.x]=0;
                    maze[current.y+next.dy][current.x+next.dx]=0;
                    stack.push({x:next.x, y:next.y});
                } else stack.pop();
            }
            player={x:0, y:0};
            goal={x:size-1, y:size-1};
            steps=0; timer=0;
            document.getElementById('steps').textContent='0';
            if(timerInterval) clearInterval(timerInterval);
            timerInterval=setInterval(()=>{ timer++; document.getElementById('timer').textContent=timer+'s'; },1000);
            draw();
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let y=0;y<maze.length;y++) {
                for(let x=0;x<maze[y].length;x++) {
                    if(maze[y][x]===1) { ctx.fillStyle='#667eea'; ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize); }
                    else { ctx.fillStyle='#2c3e50'; ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize); }
                }
            }
            ctx.fillStyle='#4CAF50'; ctx.fillRect(player.x*cellSize+2,player.y*cellSize+2,cellSize-4,cellSize-4);
            ctx.fillStyle='#f44336'; ctx.fillRect(goal.x*cellSize+2,goal.y*cellSize+2,cellSize-4,cellSize-4);
        }
        function move(dx,dy) {
            const nx=player.x+dx, ny=player.y+dy;
            if(nx>=0&&nx<maze[0].length&&ny>=0&&ny<maze.length&&maze[ny][nx]===0) {
                player.x=nx; player.y=ny; steps++;
                document.getElementById('steps').textContent=steps;
                draw();
                if(player.x===goal.x&&player.y===goal.y) {
                    clearInterval(timerInterval);
                    setTimeout(()=>{ level++; document.getElementById('level').textContent=level; alert(`🎉 恭喜！用时${timer}秒，${steps}步！`); generateMaze(10+level); },100);
                }
            }
        }
        function newGame() { level=1; document.getElementById('level').textContent='1'; generateMaze(10); }
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowUp') move(0,-1);
            else if(e.key==='ArrowDown') move(0,1);
            else if(e.key==='ArrowLeft') move(-1,0);
            else if(e.key==='ArrowRight') move(1,0);
        });
        generateMaze(10);
    </script>
</body>
</html>
