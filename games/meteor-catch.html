<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流星捕捉 - 反应挑战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #fff; overflow: hidden; }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        #gameCanvas { background: rgba(0,0,0,0.5); border-radius: 15px; }
        .controls { margin-top: 20px; }
        .btn { padding: 15px 40px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        .instructions { margin-top: 20px; font-size: 14px; opacity: 0.9; text-align: center; }
    </style>
</head>
<body>
    <div class="title">☄️ 流星捕捉</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">生命</div><div class="stat-value" id="lives">5</div></div>
        <div class="stat-box"><div class="stat-label">连击</div><div class="stat-value" id="combo">0</div></div>
    </div>
    <canvas id="gameCanvas" width="500" height="600"></canvas>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始</button>
        <button class="btn" onclick="togglePause()">⏸️ 暂停</button>
    </div>
    <div class="instructions">点击或触摸流星来捕捉它们！金色流星奖励双倍分数！</div>
    <script>
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        let meteors=[], score=0, lives=5, combo=0, gameRunning=false, isPaused=false, spawnRate=1000, lastSpawn=0, particles=[];
        function startGame() { meteors=[]; particles=[]; score=0; lives=5; combo=0; gameRunning=true; isPaused=false; spawnRate=1000; document.getElementById('score').textContent='0'; document.getElementById('lives').textContent='5'; document.getElementById('combo').textContent='0'; lastSpawn=Date.now(); gameLoop(); }
        function spawnMeteor() {
            const isGolden=Math.random()<0.2;
            meteors.push({
                x: Math.random()*450+25, y: -30,
                vx: (Math.random()-0.5)*4, vy: Math.random()*3+3,
                r: Math.random()*20+15,
                golden: isGolden,
                color: isGolden?'#FFD700':`hsl(${Math.random()*360}, 70%, 60%)`
            });
        }
        function createParticles(x,y,color) {
            for(let i=0;i<10;i++) {
                particles.push({
                    x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10,
                    life:30, color
                });
            }
        }
        function gameLoop() {
            if(!gameRunning||isPaused) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(Date.now()-lastSpawn>spawnRate) { spawnMeteor(); lastSpawn=Date.now(); spawnRate=Math.max(300,spawnRate-20); }
            meteors.forEach((m,i)=>{
                m.x+=m.vx; m.y+=m.vy;
                ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
                ctx.fillStyle=m.color; ctx.fill();
                ctx.beginPath(); ctx.arc(m.x-5,m.y-5,m.r/3,0,Math.PI*2);
                ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();
                if(m.y>canvas.height+30) {
                    meteors.splice(i,1); combo=0; lives--;
                    document.getElementById('combo').textContent='0';
                    document.getElementById('lives').textContent=lives;
                    if(lives<=0) { gameRunning=false; setTimeout(()=>alert(`游戏结束！分数：${score}`),100); }
                }
            });
            particles.forEach((p,i)=>{
                p.x+=p.vx; p.y+=p.vy; p.life--;
                ctx.globalAlpha=p.life/30;
                ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2);
                ctx.fillStyle=p.color; ctx.fill();
                ctx.globalAlpha=1;
                if(p.life<=0) particles.splice(i,1);
            });
            requestAnimationFrame(gameLoop);
        }
        function catchMeteor(clientX, clientY) {
            if(!gameRunning||isPaused) return;
            const rect=canvas.getBoundingClientRect();
            const x=clientX-rect.left, y=clientY-rect.top;
            for(let i=meteors.length-1;i>=0;i--) {
                const m=meteors[i];
                const dist=Math.sqrt(Math.pow(x-m.x,2)+Math.pow(y-m.y,2));
                if(dist<m.r+20) {
                    createParticles(m.x,m.y,m.color);
                    const points=m.golden?(20+combo)*2:10+combo;
                    score+=points; combo++;
                    document.getElementById('score').textContent=score;
                    document.getElementById('combo').textContent=combo;
                    meteors.splice(i,1);
                    break;
                }
            }
        }
        function togglePause() { isPaused=!isPaused; if(!isPaused) gameLoop(); }
        canvas.addEventListener('click',e=>catchMeteor(e.clientX,e.clientY));
        canvas.addEventListener('touchstart',e=>{ e.preventDefault(); catchMeteor(e.touches[0].clientX,e.touches[0].clientY); });
    </script>
</body>
</html>
