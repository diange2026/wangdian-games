<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字猎人 - 数学运算</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .equation { font-size: 48px; margin: 20px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 20px; min-width: 300px; text-align: center; }
        .answers { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; margin: 20px; }
        .answer-btn { padding: 25px; font-size: 28px; background: rgba(255,255,255,0.2); border: none; border-radius: 15px; color: #fff; cursor: pointer; transition: all 0.2s; }
        .answer-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .btn { padding: 15px 40px; background: linear-gradient(45deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        .message { margin: 20px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; display: none; }
        .message.show { display: block; }
    </style>
</head>
<body>
    <div class="title">🔢 数字猎人</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">连击</div><div class="stat-value" id="combo">0</div></div>
        <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">60s</div></div>
    </div>
    <div class="equation" id="equation">准备开始</div>
    <div class="answers" id="answers"></div>
    <div class="message" id="message"></div>
    <div class="controls">
        <button class="btn" onclick="startGame('add')">➕ 加法</button>
        <button class="btn" onclick="startGame('subtract')">➖ 减法</button>
        <button class="btn" onclick="startGame('multiply')">✖️ 乘法</button>
        <button class="btn" onclick="startGame('mix')">🎲 混合</button>
    </div>
    <script>
        let score=0, combo=0, timeLeft=60, correctAnswer=0, gameRunning=false, operations=['add','subtract','multiply'];
        function startGame(op) {
            score=0; combo=0; timeLeft=60; gameRunning=true;
            document.getElementById('score').textContent='0';
            document.getElementById('combo').textContent='0';
            document.getElementById('timer').textContent='60s';
            document.getElementById('message').classList.remove('show');
            if(op==='mix') operations=['add','subtract','multiply'];
            else operations=[op];
            nextQuestion();
            const timerInterval=setInterval(()=>{
                timeLeft--; document.getElementById('timer').textContent=timeLeft+'s';
                if(timeLeft<=0) { clearInterval(timerInterval); gameRunning=false; alert(`时间到！最终分数：${score}`); }
            },1000);
        }
        function nextQuestion() {
            if(!gameRunning) return;
            const op=operations[Math.floor(Math.random()*operations.length)];
            let a,b,opSymbol;
            if(op==='add') { a=Math.floor(Math.random()*50)+1; b=Math.floor(Math.random()*50)+1; correctAnswer=a+b; opSymbol='+'; }
            else if(op==='subtract') { a=Math.floor(Math.random()*50)+20; b=Math.floor(Math.random()*20)+1; correctAnswer=a-b; opSymbol='-'; }
            else { a=Math.floor(Math.random()*12)+2; b=Math.floor(Math.random()*9)+2; correctAnswer=a*b; opSymbol='×'; }
            document.getElementById('equation').textContent=`${a} ${opSymbol} ${b} = ?`;
            const answers=[correctAnswer];
            while(answers.length<4) {
                const wrong=correctAnswer+Math.floor(Math.random()*21)-10;
                if(wrong!==correctAnswer&&wrong>0&&!answers.includes(wrong)) answers.push(wrong);
            }
            answers.sort(()=>Math.random()-0.5);
            const answersEl=document.getElementById('answers');
            answersEl.innerHTML='';
            answers.forEach(ans=>{
                const btn=document.createElement('button');
                btn.className='answer-btn';
                btn.textContent=ans;
                btn.onclick=()=>checkAnswer(ans);
                answersEl.appendChild(btn);
            });
        }
        function checkAnswer(ans) {
            if(!gameRunning) return;
            const msg=document.getElementById('message');
            if(ans===correctAnswer) {
                score+=10+combo; combo++;
                msg.textContent=`✅ 正确！+${10+combo}分`;
                msg.style.background='rgba(76,175,80,0.3)';
            } else {
                combo=0;
                msg.textContent=`❌ 错误！正确答案是${correctAnswer}`;
                msg.style.background='rgba(244,67,54,0.3)';
            }
            msg.classList.add('show');
            document.getElementById('score').textContent=score;
            document.getElementById('combo').textContent=combo;
            setTimeout(()=>{ msg.classList.remove('show'); nextQuestion(); },800);
        }
    </script>
</body>
</html>
