<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 宠物消消乐 - 堆叠消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; overflow: hidden; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 15px; }
        .title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(255,255,255,0.5); margin-bottom: 10px; }
        .stats { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .stat-box { background: rgba(255,255,255,0.6); padding: 8px 20px; border-radius: 12px; text-align: center; min-width: 80px; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ff6b6b; }
        .game-container { position: relative; max-width: 500px; margin: 0 auto; perspective: 1000px; }
        .game-board { position: relative; width: 100%; height: 420px; background: rgba(255,255,255,0.3); border-radius: 20px; overflow: hidden; transform-style: preserve-3d; box-shadow: inset 0 0 30px rgba(0,0,0,0.1); }
        .pet { position: absolute; width: 58px; height: 58px; background: linear-gradient(145deg, #fff, #f0f0f0); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 34px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 3px solid rgba(255,255,255,0.5); }
        .pet:hover { transform: scale(1.12) translateZ(15px); z-index: 100 !important; }
        .pet.selected { transform: scale(1.18) translateZ(25px); box-shadow: 0 0 35px rgba(255,107,107,0.8); border-color: #ff6b6b; z-index: 100 !important; }
        .pet.matched { animation: petPop 0.5s forwards; }
        @keyframes petPop { 0% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.3) rotate(180deg); opacity: 0.8; } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }
        .collect-bar { display: flex; gap: 8px; justify-content: center; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 15px; margin-top: 15px; min-height: 75px; flex-wrap: wrap; }
        .collect-slot { width: 55px; height: 55px; background: rgba(255,255,255,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 2px dashed rgba(255,255,255,0.5); }
        .collect-slot.filled { border-style: solid; background: rgba(255,255,255,0.6); }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 25px; background: linear-gradient(45deg, #ff6b6b, #ff8e53); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; display: none; }
        .message.show { display: block; }
        .audio-control { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <div class="audio-control" onclick="toggleAudio()">🔊</div>
    <div class="header">
        <div class="title">🐾 3D 宠物消消乐</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-value" id="level">1</div></div>
            <div class="stat-box"><div class="stat-label">收集</div><div class="stat-value" id="collected">0</div></div>
            <div class="stat-box"><div class="stat-label">剩余</div><div class="stat-value" id="remaining">0</div></div>
        </div>
    </div>
    <div class="game-container">
        <div class="game-board" id="gameBoard"></div>
        <div class="collect-bar" id="collectBar">
            <div class="collect-slot"></div><div class="collect-slot"></div><div class="collect-slot"></div>
            <div class="collect-slot"></div><div class="collect-slot"></div><div class="collect-slot"></div>
            <div class="collect-slot"></div>
        </div>
    </div>
    <div class="controls">
        <button class="btn" onclick="startGame()">▶️ 开始</button>
        <button class="btn" onclick="shuffleBoard()">🔀 重排</button>
    </div>
    <div class="message" id="message">
        <h2 id="msgTitle">🎉 恭喜！</h2>
        <p id="msgText"></p>
        <button class="btn" onclick="nextLevel()" style="margin-top:20px;">下一关</button>
    </div>
    <script>
        const pets=['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧'];
        let items=[], collected=[], level=1, gameActive=false, audioEnabled=true, ctx=null;
        function initAudio() { const AudioContext=window.AudioContext||window.webkitAudioContext; ctx=new AudioContext(); }
        function playSound(freq,type='sine') { if(!audioEnabled||!ctx) return; const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=freq; osc.type=type; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.2); osc.start(); osc.stop(ctx.currentTime+0.2); }
        function toggleAudio() { audioEnabled=!audioEnabled; document.querySelector('.audio-control').textContent=audioEnabled?'🔊':'🔇'; }
        function startGame() { if(!ctx) initAudio(); collected=[]; gameActive=true; document.getElementById('level').textContent=level; document.getElementById('collected').textContent='0'; document.getElementById('message').classList.remove('show'); generatePets(6+level); renderBoard(); renderCollect(); }
        function generatePets(numTypes) { const selected=pets.slice(0,numTypes); items=[]; selected.forEach(pet=>{ for(let i=0;i<3+Math.floor(Math.random()*2);i++) items.push({pet, id:Math.random().toString(36).substr(2,9), x:0, y:0, z:0, matched:false }); }); items.sort(()=>Math.random()-0.5); items.forEach((item,i)=>{ const col=i%7, row=Math.floor(i/7); item.x=col*62+25+Math.random()*15; item.y=row*62+25+Math.random()*15; item.z=Math.floor(i/7); }); }
        function renderBoard() { const board=document.getElementById('gameBoard'); board.innerHTML=''; items.forEach(item=>{ if(item.matched) return; const el=document.createElement('div'); el.className='pet'+(item.selected?' selected':''); el.textContent=item.pet; el.style.left=item.x+'px'; el.style.top=item.y+'px'; el.style.zIndex=item.z; el.onclick=()=>selectPet(item); board.appendChild(el); item.el=el; }); document.getElementById('remaining').textContent=items.filter(i=>!i.matched).length; }
        function renderCollect() { const bar=document.getElementById('collectBar'); bar.innerHTML=''; for(let i=0;i<7;i++) { const slot=document.createElement('div'); slot.className='collect-slot'+(collected[i]?' filled':''); slot.textContent=collected[i]||''; bar.appendChild(slot); } }
        function selectPet(item) { if(!gameActive||item.selected||item.matched) return; const emptyIndex=collected.findIndex(c=>!c); if(emptyIndex===-1) return; item.selected=true; collected[emptyIndex]=item; playSound(523); renderBoard(); renderCollect(); checkMatch(); }
        function checkMatch() { for(let i=2;i<collected.length;i++) { if(collected[i]&&collected[i-1]&&collected[i-2]&&collected[i].pet===collected[i-1].pet&&collected[i-1].pet===collected[i-2].pet) { setTimeout(()=>{ collected[i].matched=true; collected[i-1].matched=true; collected[i-2].matched=true; collected[i].el.classList.add('matched'); collected[i-1].el.classList.add('matched'); collected[i-2].el.classList.add('matched'); collected[i]=null; collected[i-1]=null; collected[i-2]=null; playSound(659,'square'); renderBoard(); renderCollect(); document.getElementById('collected').textContent=parseInt(document.getElementById('collected').textContent)+3; checkWin(); },400); return; } } }
        function shuffleBoard() { if(!gameActive) return; items.filter(i=>!i.matched).forEach(item=>{ item.x=Math.random()*400+25; item.y=Math.random()*320+25; }); renderBoard(); playSound(440); }
        function checkWin() { const remaining=items.filter(i=>!i.matched).length; if(remaining===0) { gameActive=false; playSound(880,'triangle'); document.getElementById('msgTitle').textContent='🎉 恭喜！'; document.getElementById('msgText').textContent=`关卡${level}完成！`; document.getElementById('message').classList.add('show'); } else if(collected.filter(c=>c).length===7) { gameActive=false; document.getElementById('msgTitle').textContent='😢 游戏结束'; document.getElementById('msgText').textContent='收集栏已满！'; document.getElementById('message').classList.add('show'); } }
        function nextLevel() { level++; startGame(); }
        startGame();
    </script>
</body>
</html>
