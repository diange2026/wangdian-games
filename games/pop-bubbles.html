<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捏泡泡纸 - 无限解压</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #fff; }
        .title { font-size: 36px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.3); padding: 15px 30px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .stat-value { font-size: 32px; font-weight: bold; }
        .bubble-wrap { display: grid; grid-template-columns: repeat(8,1fr); gap: 10px; background: rgba(255,255,255,0.2); padding: 20px; border-radius: 20px; margin-bottom: 30px; max-width: 600px; }
        .bubble { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.2) 60%, rgba(255,255,255,0.1)); border: 2px solid rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .bubble:hover { transform: scale(1.05); }
        .bubble.popped { background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); transform: scale(0.9); }
        .btn { padding: 15px 40px; background: rgba(255,255,255,0.3); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        .message { margin: 20px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 18px; text-align: center; }
    </style>
</head>
<body>
    <div class="title">🫧 捏泡泡纸</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">捏破</div><div class="stat-value" id="popped">0</div></div>
        <div class="stat-box"><div class="stat-label">总数</div><div class="stat-value" id="total">0</div></div>
        <div class="stat-box"><div class="stat-label">完成率</div><div class="stat-value" id="percent">0%</div></div>
    </div>
    <div class="bubble-wrap" id="bubbleWrap"></div>
    <div class="message" id="message">点击泡泡捏破它们！超级解压！</div>
    <div>
        <button class="btn" onclick="initBubbles(24)">🔵 小 (24 个)</button>
        <button class="btn" onclick="initBubbles(48)">🔵 中 (48 个)</button>
        <button class="btn" onclick="initBubbles(64)">🔵 大 (64 个)</button>
    </div>
    <script>
        let popped=0, total=0;
        function initBubbles(n) {
            popped=0; total=n;
            document.getElementById('popped').textContent='0';
            document.getElementById('total').textContent=n;
            document.getElementById('percent').textContent='0%';
            document.getElementById('message').textContent='🫧 捏捏捏！全部捏破！';
            const wrap=document.getElementById('bubbleWrap');
            wrap.innerHTML='';
            const cols=n<=24?6:n<=48?8:8;
            wrap.style.gridTemplateColumns=`repeat(${cols},1fr)`;
            for(let i=0;i<n;i++) {
                const bubble=document.createElement('div');
                bubble.className='bubble';
                bubble.textContent='🫧';
                bubble.onclick=()=>popBubble(bubble);
                wrap.appendChild(bubble);
            }
        }
        function popBubble(bubble) {
            if(bubble.classList.contains('popped')) return;
            bubble.classList.add('popped');
            bubble.textContent='💥';
            popped++; total++;
            document.getElementById('popped').textContent=popped;
            const percent=Math.round(popped/total*100);
            document.getElementById('percent').textContent=percent+'%';
            if(popped===total) document.getElementById('message').textContent='🎉 全部捏破！再来一张？';
        }
        initBubbles(24);
    </script>
</body>
</html>
