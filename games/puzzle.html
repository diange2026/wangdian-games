<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼图游戏 - 数字华容道</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 36px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .grid { display: grid; gap: 5px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; margin-bottom: 20px; }
        .tile {
            width: 80px; height: 80px; background: linear-gradient(45deg, #667eea, #764ba2);
            border: none; border-radius: 10px; font-size: 32px; font-weight: bold;
            color: #fff; cursor: pointer; transition: all 0.2s;
        }
        .tile:hover { transform: scale(1.05); }
        .tile.empty { background: rgba(255,255,255,0.1); cursor: default; }
        .tile.correct { background: linear-gradient(45deg, #4CAF50, #45a049); }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 25px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer;
        }
        .message { margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; display: none; }
        .message.show { display: block; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="title">🧩 拼图游戏</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">移动次数</div><div class="stat-value" id="moves">0</div></div>
        <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">0s</div></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="message" id="message"></div>
    <div class="controls">
        <button class="btn" onclick="initGame(3)">🎯 简单 (3×3)</button>
        <button class="btn" onclick="initGame(4)">🎯 中等 (4×4)</button>
        <button class="btn" onclick="initGame(5)">🎯 困难 (5×5)</button>
    </div>
    <script>
        let size=3, tiles=[], emptyPos={r:0, c:0}, moves=0, timer=0, timerInterval=null, gameWon=false;
        function initGame(n) {
            size=n; moves=0; timer=0; gameWon=false;
            document.getElementById('moves').textContent='0';
            document.getElementById('timer').textContent='0s';
            document.getElementById('message').classList.remove('show');
            if(timerInterval) clearInterval(timerInterval);
            timerInterval=setInterval(()=>{timer++;document.getElementById('timer').textContent=timer+'s';},1000);
            tiles=Array(size).fill(null).map(()=>Array(size).fill(0));
            let nums=[];
            for(let i=1;i<size*size;i++) nums.push(i);
            nums.push(0);
            nums.sort(()=>Math.random()-0.5);
            for(let r=0;r<size;r++) for(let c=0;c<size;c++) {
                tiles[r][c]=nums[r*size+c];
                if(tiles[r][c]===0) emptyPos={r, c};
            }
            renderGrid();
        }
        function renderGrid() {
            const grid=document.getElementById('grid');
            grid.innerHTML='';
            grid.style.gridTemplateColumns=`repeat(${size}, 80px)`;
            for(let r=0;r<size;r++) {
                for(let c=0;c<size;c++) {
                    const tile=document.createElement('button');
                    tile.className='tile';
                    if(tiles[r][c]===0) { tile.classList.add('empty'); }
                    else {
                        tile.textContent=tiles[r][c];
                        const correctR=Math.floor((tiles[r][c]-1)/size);
                        const correctC=(tiles[r][c]-1)%size;
                        if(r===correctR&&c===correctC) tile.classList.add('correct');
                    }
                    tile.onclick=()=>moveTile(r,c);
                    grid.appendChild(tile);
                }
            }
        }
        function moveTile(r,c) {
            if(gameWon) return;
            const dr=Math.abs(r-emptyPos.r), dc=Math.abs(c-emptyPos.c);
            if((dr===1&&dc===0)||(dr===0&&dc===1)) {
                tiles[emptyPos.r][emptyPos.c]=tiles[r][c];
                tiles[r][c]=0;
                emptyPos={r, c};
                moves++;
                document.getElementById('moves').textContent=moves;
                renderGrid();
                checkWin();
            }
        }
        function checkWin() {
            for(let r=0;r<size;r++) {
                for(let c=0;c<size;c++) {
                    const expected=r*size+c+1;
                    if(r===size-1&&c===size-1) { if(tiles[r][c]!==0) return; }
                    else if(tiles[r][c]!==expected) return;
                }
            }
            gameWon=true;
            clearInterval(timerInterval);
            document.getElementById('message').innerHTML=`🎉 恭喜完成！<br>用时：${timer}秒 | 移动：${moves}次`;
            document.getElementById('message').classList.add('show');
        }
        initGame(3);
    </script>
</body>
</html>
