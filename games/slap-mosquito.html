<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍蚊子 - 魔性解压</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); min-height: 100vh; overflow: hidden; padding: 20px; color: #fff; }
        .title { font-size: 36px; margin-bottom: 20px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.3); padding: 15px 30px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .stat-value { font-size: 32px; font-weight: bold; }
        #gameArea { position: relative; width: 100%; max-width: 600px; height: 500px; background: rgba(255,255,255,0.1); border-radius: 20px; margin: 0 auto; overflow: hidden; cursor: crosshair; }
        .mosquito { position: absolute; font-size: 40px; cursor: pointer; transition: transform 0.1s; animation: fly 0.5s infinite alternate; }
        .mosquito:active { transform: scale(0.8); }
        .mosquito.dead { animation: none; transform: rotate(180deg) scale(0.5); opacity: 0.5; }
        .splatter { position: absolute; font-size: 30px; pointer-events: none; animation: fadeOut 1s forwards; }
        @keyframes fly { from { transform: translate(-5px, -5px) rotate(-5deg); } to { transform: translate(5px, 5px) rotate(5deg); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(1.5); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .btn { padding: 15px 40px; background: linear-gradient(45deg, #ff6b6b, #ff8e53); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 20px 10px; }
        .message { margin: 20px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="title">🦟 拍蚊子</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">拍死</div><div class="stat-value" id="killed">0</div></div>
        <div class="stat-box"><div class="stat-label">逃跑</div><div class="stat-value" id="escaped">0</div></div>
        <div class="stat-box"><div class="stat-label">时间</div><div class="stat-value" id="timer">30s</div></div>
    </div>
    <div id="gameArea"></div>
    <div class="message" id="message">点击屏幕开始游戏！拍死蚊子超解压！</div>
    <div style="text-align:center;">
        <button class="btn" onclick="startGame()">▶️ 开始拍蚊子</button>
    </div>
    <script>
        let killed=0, escaped=0, timeLeft=30, gameActive=false, spawnInterval=null, mosquitoes=[];
        const sounds={splat:'💥', buzz:'嗡嗡嗡~'};
        function startGame() {
            killed=0; escaped=0; timeLeft=30; gameActive=true;
            document.getElementById('killed').textContent='0';
            document.getElementById('escaped').textContent='0';
            document.getElementById('timer').textContent='30s';
            document.getElementById('message').textContent='🦟 拍拍拍！别让蚊子跑了！';
            document.getElementById('gameArea').innerHTML='';
            mosquitoes=[];
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval=setInterval(spawnMosquito, 800);
            const timerInterval=setInterval(()=>{
                timeLeft--;
                document.getElementById('timer').textContent=timeLeft+'s';
                if(timeLeft<=0) {
                    clearInterval(timerInterval);
                    clearInterval(spawnInterval);
                    gameActive=false;
                    document.getElementById('message').textContent=`🎉 时间到！拍死${killed}只，逃跑${escaped}只！${killed>20?'你是拍蚊高手！':killed>10?'还不错！':'多练习！'}`;
                    mosquitoes.forEach(m=>{ if(m.el) m.el.remove(); });
                    mosquitoes=[];
                }
            },1000);
        }
        function spawnMosquito() {
            if(!gameActive) return;
            const area=document.getElementById('gameArea');
            const mosquito=document.createElement('div');
            mosquito.className='mosquito';
            mosquito.textContent='🦟';
            const x=Math.random()*(area.offsetWidth-50);
            const y=Math.random()*(area.offsetHeight-50);
            mosquito.style.left=x+'px';
            mosquito.style.top=y+'px';
            mosquito.onclick=(e)=>{
                e.stopPropagation();
                if(mosquito.classList.contains('dead')) return;
                killed++;
                document.getElementById('killed').textContent=killed;
                mosquito.classList.add('dead');
                const splatter=document.createElement('div');
                splatter.className='splatter';
                splatter.textContent='💦';
                splatter.style.left=x+'px';
                splatter.style.top=y+'px';
                area.appendChild(splatter);
                setTimeout(()=>{ if(mosquito.parentNode) mosquito.remove(); if(splatter.parentNode) splatter.remove(); },1000);
            };
            area.appendChild(mosquito);
            mosquitoes.push({el:mosquito, x, y, life:3000});
            setTimeout(()=>{
                if(mosquito.parentNode&&!mosquito.classList.contains('dead')) {
                    escaped++;
                    document.getElementById('escaped').textContent=escaped;
                    mosquito.remove();
                    mosquitoes=mosquitoes.filter(m=>m.el!==mosquito);
                }
            },3000);
        }
        document.getElementById('gameArea').onclick=(e)=>{
            if(e.target===document.getElementById('gameArea')&&!gameActive) startGame();
        };
    </script>
</body>
</html>
