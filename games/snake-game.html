<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - 经典街机游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .scores {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        #gameCanvas {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 auto;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 200px;
            margin: 20px auto;
        }

        .btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            margin-top: 10px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .message {
            text-align: center;
            font-size: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🐍 贪吃蛇</div>
        </div>

        <div class="scores">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas" width="300" height="300"></canvas>
        </div>

        <div class="message" id="message"></div>

        <div class="controls">
            <div></div>
            <button class="btn" onclick="changeDirection('up')">⬆️</button>
            <div></div>
            <button class="btn" onclick="changeDirection('left')">⬅️</button>
            <button class="btn" onclick="changeDirection('down')">⬇️</button>
            <button class="btn" onclick="changeDirection('right')">➡️</button>
        </div>

        <button class="btn-main" onclick="initGame()">🔄 开始游戏</button>

        <div class="instructions">
            <strong>玩法说明：</strong><br>
            使用方向键或按钮控制蛇的移动<br>
            吃到食物变长，撞到墙壁或自己就结束<br>
            看你能得多少分！
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let best = localStorage.getItem('snake-best') || 0;
        let gameInterval = null;
        let gameRunning = false;

        document.getElementById('best').textContent = best;

        function initGame() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('message').classList.remove('show');
            placeFood();
            
            if (gameInterval) clearInterval(gameInterval);
            gameRunning = true;
            gameInterval = setInterval(update, 150);
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function changeDirection(newDir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            if (opposites[newDir] !== direction) {
                nextDirection = newDir;
            }
        }

        function update() {
            if (!gameRunning) return;

            direction = nextDirection;
            const head = {...snake[0]};

            if (direction === 'up') head.y--;
            else if (direction === 'down') head.y++;
            else if (direction === 'left') head.x--;
            else if (direction === 'right') head.x++;

            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
                snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画食物
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 画蛇
            snake.forEach((seg, index) => {
                ctx.fillStyle = index === 0 ? '#4ECDC4' : '#45B7AA';
                ctx.fillRect(
                    seg.x * gridSize + 1,
                    seg.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            
            if (score > best) {
                best = score;
                localStorage.setItem('snake-best', best);
                document.getElementById('best').textContent = best;
            }

            const msg = document.getElementById('message');
            msg.innerHTML = `🎮 游戏结束！<br>最终分数：${score}`;
            msg.classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeDirection('up');
            else if (e.key === 'ArrowDown') changeDirection('down');
            else if (e.key === 'ArrowLeft') changeDirection('left');
            else if (e.key === 'ArrowRight') changeDirection('right');
        });

        // 初始绘制
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
