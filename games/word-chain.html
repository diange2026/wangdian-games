<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字接龙 - 创意组词</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #fff;
        }
        .title { font-size: 32px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .game-area { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin-bottom: 20px; text-align: center; max-width: 600px; }
        .last-word { font-size: 48px; margin-bottom: 20px; color: #FFD700; }
        .input-area { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        #wordInput { padding: 15px; font-size: 20px; border: none; border-radius: 10px; width: 250px; text-align: center; }
        .btn {
            padding: 15px 30px; background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white; border: none; border-radius: 10px; font-size: 18px;
            font-weight: bold; cursor: pointer;
        }
        .word-history { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; max-width: 600px; max-height: 200px; overflow-y: auto; }
        .word-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-tag { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; }
        .message { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 18px; }
        .hint { margin-top: 15px; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="title">📝 文字接龙</div>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">回合数</div><div class="stat-value" id="rounds">0</div></div>
        <div class="stat-box"><div class="stat-label">有效词数</div><div class="stat-value" id="validCount">0</div></div>
        <div class="stat-box"><div class="stat-label">最长链</div><div class="stat-value" id="longest">0</div></div>
    </div>
    <div class="game-area">
        <div style="font-size: 16px; opacity: 0.9; margin-bottom: 10px;">上一个词</div>
        <div class="last-word" id="lastWord">开始</div>
        <div class="message" id="message">请输入以"始"开头的词语</div>
        <div class="input-area">
            <input type="text" id="wordInput" placeholder="输入词语..." maxlength="10">
            <button class="btn" onclick="submitWord()">提交</button>
        </div>
        <button class="btn" onclick="newGame()">🔄 新游戏</button>
        <div class="hint">💡 提示：按 Enter 键也可提交 | 输入两个字的词语最容易</div>
    </div>
    <div class="word-history">
        <div style="font-size: 14px; opacity: 0.9; margin-bottom: 10px; text-align: center;">词语链</div>
        <div class="word-list" id="wordList"></div>
    </div>
    <script>
        let lastChar='始', words=[], validWords=[], currentChain=0, maxChain=0;
        const commonWords=['开始','始终','终点','点头','头发','发现','现在','在家','家人','人民','民主','主人','人生','生活','活动','动物','物品','品质','质量','量杯','杯子','子女','女人','人民','民主','主要','要求','求和','和平','平安','安全','全部','部门','门口','口水','水果','果然','然后','后面','面条','条件','件数','数学','学习','习惯','惯性','性格','格式','式样','样子','子女','女孩','孩子','子女','女子','人民'];
        function newGame() {
            lastChar='始'; words=[]; validWords=[]; currentChain=0;
            document.getElementById('lastWord').textContent='开始';
            document.getElementById('wordList').innerHTML='';
            document.getElementById('rounds').textContent='0';
            document.getElementById('validCount').textContent='0';
            document.getElementById('longest').textContent='0';
            document.getElementById('message').textContent='请输入以"始"开头的词语';
            document.getElementById('wordInput').value='';
            document.getElementById('wordInput').focus();
        }
        function submitWord() {
            const input=document.getElementById('wordInput');
            const word=input.value.trim();
            if(word.length<2) { showMessage('❌ 至少两个字！',false); return; }
            if(words.includes(word)) { showMessage('❌ 这个词已经用过了！',false); return; }
            if(word[0]!==lastChar) { showMessage(`❌ 需要以"${lastChar}"开头！`,false); return; }
            words.push(word);
            validWords.push(word);
            currentChain++;
            if(currentChain>maxChain) maxChain=currentChain;
            lastChar=word[word.length-1];
            document.getElementById('lastWord').textContent=word;
            document.getElementById('wordList').innerHTML+=`<span class="word-tag">${word}</span>`;
            document.getElementById('rounds').textContent=words.length;
            document.getElementById('validCount').textContent=validWords.length;
            document.getElementById('longest').textContent=maxChain;
            document.getElementById('message').textContent=`✅ 很好！请输入以"${lastChar}"开头的词语`;
            input.value='';
            input.focus();
            if(Math.random()<0.3&&words.length>3) {
                setTimeout(()=>{ showMessage(`💡 提示：可以试试"${lastChar}"+常见字`,true); },1000);
            }
        }
        function showMessage(msg, isHint) {
            const msgEl=document.getElementById('message');
            msgEl.textContent=msg;
            msgEl.style.background=isHint?'rgba(76,175,80,0.3)':'rgba(244,67,54,0.3)';
            setTimeout(()=>{ msgEl.style.background='rgba(255,255,255,0.2)'; },2000);
        }
        document.getElementById('wordInput').addEventListener('keydown',e=>{
            if(e.key==='Enter') submitWord();
        });
        newGame();
    </script>
</body>
</html>
