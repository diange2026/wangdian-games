<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讯网答案提取器 - 设置</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <h1>⚙️ 讯网答案提取器设置</h1>
                <p class="subtitle">自定义您的提取体验</p>
            </div>
            <div class="header-actions">
                <button id="back-btn" class="btn btn-outline">返回</button>
                <button id="reset-btn" class="btn btn-warning">恢复默认</button>
            </div>
        </header>

        <div class="content">
            <!-- 设置表单 -->
            <form id="settings-form">
                <!-- 提取设置 -->
                <section class="settings-section">
                    <h2>🔍 提取设置</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <label>
                                <input type="checkbox" id="auto-extract" name="autoExtract">
                                <span class="label-text">自动提取答案</span>
                                <span class="label-desc">进入答案页面时自动提取</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <input type="checkbox" id="auto-save" name="autoSave">
                                <span class="label-text">自动保存到本地题库</span>
                                <span class="label-desc">提取后自动保存到本地数据库</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <span class="label-text">默认导出格式</span>
                                <select id="export-format" name="exportFormat">
                                    <option value="excel">Excel (.xlsx)</option>
                                    <option value="csv">CSV (.csv)</option>
                                    <option value="json">JSON (.json)</option>
                                </select>
                                <span class="label-desc">一键导出的默认文件格式</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- 通知设置 -->
                <section class="settings-section">
                    <h2>🔔 通知设置</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <label>
                                <input type="checkbox" id="notification-enabled" name="notificationEnabled">
                                <span class="label-text">启用通知</span>
                                <span class="label-desc">提取完成时显示桌面通知</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <span class="label-text">数据保留时间</span>
                                <select id="data-retention" name="dataRetentionDays">
                                    <option value="7">7天</option>
                                    <option value="30">30天</option>
                                    <option value="90">90天</option>
                                    <option value="365">1年</option>
                                    <option value="0">永久保留</option>
                                </select>
                                <span class="label-desc">历史数据的保留时间</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- 界面设置 -->
                <section class="settings-section">
                    <h2>🎨 界面设置</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <label>
                                <span class="label-text">主题模式</span>
                                <select id="theme" name="theme">
                                    <option value="light">浅色模式</option>
                                    <option value="dark">深色模式</option>
                                    <option value="auto">跟随系统</option>
                                </select>
                                <span class="label-desc">插件界面的颜色主题</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <span class="label-text">语言</span>
                                <select id="language" name="language">
                                    <option value="zh-CN">简体中文</option>
                                    <option value="en">English</option>
                                </select>
                                <span class="label-desc">插件界面语言</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <input type="checkbox" id="compact-mode" name="compactMode">
                                <span class="label-text">紧凑模式</span>
                                <span class="label-desc">减少界面间距，显示更多内容</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- 高级设置 -->
                <section class="settings-section">
                    <h2>⚡ 高级设置</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <label>
                                <span class="label-text">提取超时时间</span>
                                <input type="number" id="timeout" name="timeout" min="5" max="60" step="5">
                                <span class="label-unit">秒</span>
                                <span class="label-desc">单次提取的最大等待时间</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <span class="label-text">最大提取数量</span>
                                <input type="number" id="max-extract" name="maxExtract" min="10" max="1000" step="10">
                                <span class="label-unit">题</span>
                                <span class="label-desc">单次提取的最大题目数量</span>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <input type="checkbox" id="debug-mode" name="debugMode">
                                <span class="label-text">调试模式</span>
                                <span class="label-desc">启用详细日志输出</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- 数据管理 -->
                <section class="settings-section">
                    <h2>🗃️ 数据管理</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <label>
                                <span class="label-text">本地题库大小</span>
                                <span id="question-bank-size" class="label-value">加载中...</span>
                                <button type="button" id="view-bank-btn" class="btn-small">查看</button>
                            </label>
                        </div>
                        
                        <div class="setting-item">
                            <label>
                                <span class="label-text">提取历史记录</span>
                                <span id="history-count" class="label-value">加载中...</span>
                                <button type="button" id="view-history-btn" class="btn-small">查看</button>
                            </label>
                        </div>
                        
                        <div class="btn-group-vertical">
                            <button type="button" id="export-all-btn" class="btn btn-secondary">导出所有数据</button>
                            <button type="button" id="clear-data-btn" class="btn btn-danger">清空所有数据</button>
                            <button type="button" id="backup-btn" class="btn btn-info">创建备份</button>
                        </div>
                    </div>
                </section>

                <!-- 关于 -->
                <section class="settings-section">
                    <h2>ℹ️ 关于</h2>
                    <div class="settings-group">
                        <div class="about-info">
                            <div class="about-item">
                                <span class="about-label">版本:</span>
                                <span id="version" class="about-value">1.0.0</span>
                            </div>
                            <div class="about-item">
                                <span class="about-label">最后更新:</span>
                                <span id="last-update" class="about-value">2026-04-19</span>
                            </div>
                            <div class="about-item">
                                <span class="about-label">技术支持:</span>
                                <span class="about-value">
                                    <a href="mailto:support@xunwang-extractor.com">support@xunwang-extractor.com</a>
                                </span>
                            </div>
                            <div class="about-item">
                                <span class="about-label">官方网站:</span>
                                <span class="about-value">
                                    <a href="https://github.com/diange2026/xunwang-extractor" target="_blank">GitHub仓库</a>
                                </span>
                            </div>
                        </div>
                        
                        <div class="btn-group">
                            <button type="button" id="check-update-btn" class="btn btn-outline">检查更新</button>
                            <button type="button" id="help-btn" class="btn btn-outline">帮助文档</button>
                            <button type="button" id="privacy-btn" class="btn btn-outline">隐私政策</button>
                        </div>
                    </div>
                </section>
            </form>
        </div>

        <!-- 底部操作栏 -->
        <footer class="footer">
            <div class="footer-actions">
                <button type="button" id="cancel-btn" class="btn btn-outline">取消</button>
                <button type="submit" form="settings-form" id="save-btn" class="btn btn-primary">保存设置</button>
            </div>
            <div class="status-bar" id="status-bar"></div>
        </footer>
    </div>

    <script src="options.js"></script>
</body>
</html>
